<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Affiliate Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f0f2f5}

/* LAYERS */
.layer{display:none;min-height:100vh}
.layer.active{display:block}

/* STORE */
#storeLayer{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:white;
padding:25px;
margin:15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
width:260px;
text-align:center;
}

/* ADMIN BUTTON */
.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:12px 16px;
border-radius:30px;
cursor:pointer;
z-index:999;
}

/* TOPBAR */
.topbar{
padding:15px;
color:white;
display:flex;
gap:10px;
align-items:center;
}
.purple{background:#6C5CE7}
.green{background:#00B894}

.back{cursor:pointer;font-size:22px}

/* GRID */
.grid{column-count:2;column-gap:10px;padding:15px}

.card{
background:white;
margin-bottom:12px;
border-radius:15px;
overflow:hidden;
position:relative;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card img{width:100%}

.info{padding:10px;font-weight:bold}

.buy{
display:block;
background:#00b894;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
}

/* LINK ICON */
.linkBtn{
position:absolute;
top:8px;
right:8px;
border:none;
background:white;
border-radius:50%;
width:28px;height:28px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,.3);
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:8px 20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<div id="toast">Link Copied 🔗</div>
<div class="adminBtn" onclick="openAdmin()">ADMIN</div>

<!-- STORE -->
<div id="storeLayer" class="layer active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY -->
<div id="categoryLayer" class="layer">
<div class="topbar purple">
<span class="back" onclick="goHome()">⬅</span>
<b>Categories</b>
</div>
<div id="categoryGrid" class="grid"></div>
</div>

<!-- PRODUCT -->
<div id="productLayer" class="layer">
<div class="topbar green">
<span class="back" onclick="backToCategories()">⬅</span>
<b>Products</b>
</div>
<div id="productGrid" class="grid"></div>
</div>

<!-- ADMIN -->
<div id="adminLayer" class="layer">
<div class="topbar" style="background:black">
<span class="back" onclick="goHome()">⬅</span>
<b>Admin Panel</b>
</div>

<div style="padding:20px">

<h3>Category</h3>
<input id="catName" placeholder="Category name">
<button onclick="addCategory()">Add</button>
<button onclick="deleteCategory()">Delete</button>

<hr>

<h3>Product</h3>
<input id="prodName" placeholder="Name"><br>
<input id="prodImg" placeholder="Image URL"><br>
<input id="prodPrice" placeholder="Price"><br>
<input id="prodLink" placeholder="Affiliate Link"><br><br>

<button onclick="addProduct()">Add</button>
<button onclick="deleteProduct()">Delete Last</button>

</div>
</div>

<script>
const data={
IND:{Tech:[],Travel:[]},
US:{Tech:[]}
};

let currentStore="";
let currentCategory="";

/* FIX STICKY */
function showLayer(id){
document.querySelectorAll(".layer")
.forEach(l=>l.classList.remove("active"));

document.getElementById(id).classList.add("active");
window.scrollTo(0,0);
}

/* NAVIGATION */
function openStore(store){
currentStore=store;
showLayer("categoryLayer");
renderCategories();
updateURL();
}

function openCategory(cat){
currentCategory=cat;
showLayer("productLayer");
renderProducts();
updateURL();
}

function goHome(){
currentStore="";
currentCategory="";
showLayer("storeLayer");
history.pushState({},'',location.pathname);
}

function backToCategories(){
showLayer("categoryLayer");
}

function openAdmin(){
showLayer("adminLayer");
}

/* URL GENERATOR */
function updateURL(){
let url=`?store=${currentStore}`;
if(currentCategory) url+=`&cat=${currentCategory}`;
history.pushState({},'',url);
}

/* DEEP LINK FIX */
window.onload=function(){
const params=new URLSearchParams(location.search);
const s=params.get("store");
const c=params.get("cat");

if(s && data[s]){
currentStore=s;

if(c && data[s][c]){
currentCategory=c;
showLayer("productLayer");
renderProducts();
}else{
showLayer("categoryLayer");
renderCategories();
}
}
};

/* LINK COPY */
function copyLink(link,e){
e.stopPropagation();
navigator.clipboard.writeText(link);
toast();
}

function toast(){
const t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* RENDER */
function renderCategories(){
const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{
const link=`${location.origin}${location.pathname}?store=${currentStore}&cat=${cat}`;

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<button class="linkBtn"
onclick="copyLink('${link}',event)">🔗</button>
<img src="https://via.placeholder.com/400x300">
<div class="info">${cat}</div>
</div>`;
});
}

function renderProducts(){
const grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{
grid.innerHTML+=`
<div class="card">
<button class="linkBtn"
onclick="copyLink('${p.link}',event)">🔗</button>
<img src="${p.img}">
<div class="info">${p.name}<br>${p.price}</div>
<a class="buy" href="${p.link}" target="_blank">Buy</a>
</div>`;
});
}

/* ADMIN */
function addCategory(){
const n=catName.value;
if(!n)return;
data[currentStore][n]=[];
renderCategories();
}

function deleteCategory(){
delete data[currentStore][currentCategory];
renderCategories();
}

function addProduct(){
data[currentStore][currentCategory].push({
name:prodName.value,
img:prodImg.value,
price:prodPrice.value,
link:prodLink.value
});
renderProducts();
}

function deleteProduct(){
data[currentStore][currentCategory].pop();
renderProducts();
}
</script>

</body>
</html>
