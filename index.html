<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Multi Store</title>

<style>

/* ===== GENERAL ===== */
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
}

.hidden{display:none}

/* ===== LAYER 1 STORE ===== */
#storeLayer{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.store{
  width:80%;
  padding:25px;
  text-align:center;
  font-size:22px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.ind{background:#ff5722;}
.us{background:black;}

/* ===== HEADER ===== */
.header{
  position:sticky;
  top:0;
  background:white;
  padding:10px;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}

/* ===== SEARCH ===== */
.search{
  width:95%;
  margin:10px auto;
  padding:10px;
  font-size:16px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
}

/* ===== CARD ===== */
.card{
  background:white;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card h3{
  margin:6px;
}

.card p{
  margin:6px;
  font-size:14px;
}

.btn{
  display:block;
  text-align:center;
  background:black;
  color:white;
  padding:8px;
  text-decoration:none;
  margin:6px;
}

.share{
  background:#eee;
  border:none;
  padding:6px;
  margin:6px;
}

</style>
</head>

<body>

<!-- ================= LAYER 1 ================= -->
<div id="storeLayer">
  <div class="store ind" onclick="openStore('IND')">🇮🇳 India Store</div>
  <div class="store us" onclick="openStore('US')">🇺🇸 US Store</div>
</div>


<!-- ================= LAYER 2 ================= -->
<div id="categoryLayer" class="hidden">

<div class="header">
<button onclick="backToStore()">⬅ Back</button>
<b id="storeTitle"></b>
</div>

<input class="search" placeholder="Search Categories..." onkeyup="searchCategory(this.value)">

<div id="categoryGrid" class="grid"></div>

</div>


<!-- ================= LAYER 3 ================= -->
<div id="productLayer" class="hidden">

<div class="header">
<button onclick="backToCategory()">⬅ Back</button>
<b id="categoryTitle"></b>
</div>

<input class="search" placeholder="Search Products..." onkeyup="searchProduct(this.value)">

<div id="productGrid" class="grid"></div>

</div>


<script>

/* ================= DATA ================= */
/* DAY 1 + TODAY PRODUCTS INCLUDED */

const DATA = {

IND:{

price:"₹2799",
rating:"4⭐",
link:"https://amzn.to/40OZeuH",
desc:"Portable JBL speaker with powerful bass, long battery life, wireless connectivity, durable design and premium sound performance ideal for travel and home entertainment."
},
{
name:"Logitech M185 Mouse",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
price:"₹790",
rating:"4.2⭐",
link:"https://amzn.to/4sZjWE2",
desc:"Reliable wireless mouse with ergonomic comfort, plug and play USB receiver, smooth tracking and long battery life perfect for office and daily computer use."
}
]
},

Travel:{
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
desc:"Travel essentials helping organize luggage efficiently and improve packing experience.",
products:[
{
name:"6 Pack Travel Bags",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
price:"₹799",
rating:"4.3⭐",
link:"https://amzn.to/47iPnky",
desc:"Packing cubes set designed to organize clothes, save luggage space and simplify travel packing with durable lightweight waterproof fabric."
}
]
}
},

US:{
Fashion:{
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/84666b61-2360-42e9-b4d3-283f8e2f4292.jpg",
desc:"Trending clothing styles designed for comfort, fashion and everyday lifestyle wear.",

Home:{
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp",

desc:"Modern photo frame collection perfect for wall gallery decoration with durable materials and elegant minimal design."
}
]
}
}

};

let currentStore="";
let currentCategory="";

/* ================= NAVIGATION ================= */

function openStore(store){
currentStore=store;
storeLayer.classList.add("hidden");
categoryLayer.classList.remove("hidden");
storeTitle.innerText=store+" Store";
loadCategories();
}

function backToStore(){
categoryLayer.classList.add("hidden");
storeLayer.classList.remove("hidden");
}

function openCategory(cat){
currentCategory=cat;
categoryLayer.classList.add("hidden");
productLayer.classList.remove("hidden");
categoryTitle.innerText=cat;
loadProducts();
}

function backToCategory(){
productLayer.classList.add("hidden");
categoryLayer.classList.remove("hidden");
}

/* ================= LOADERS ================= */

function loadCategories(){
categoryGrid.innerHTML="";
Object.keys(DATA[currentStore]).forEach(cat=>{
let c=DATA[currentStore][cat];

categoryGrid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<img src="${c.img}">
<h3>${cat}</h3>
<p>${c.desc}</p>
<button class="share" onclick="event.stopPropagation();shareLink('${cat}')">Share</button>
</div>`;
});
}

function loadProducts(){
productGrid.innerHTML="";
DATA[currentStore][currentCategory].products.forEach(p=>{
productGrid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<p><b>${p.price}</b> | ⭐ ${p.rating}</p>
<a class="btn" href="${p.link}" target="_blank">Buy Now</a>
<button class="share" onclick="shareLink('${p.name}')">Share</button>
</div>`;
});
}

/* ================= SEARCH ================= */

function searchCategory(val){
document.querySelectorAll("#categoryGrid .card")
.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val.toLowerCase())
?"block":"none";
});
}

function searchProduct(val){
document.querySelectorAll("#productGrid .card")
.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val.toLowerCase())
?"block":"none";
});
}

/* ================= SHARE ================= */

function shareLink(text){
navigator.clipboard.writeText(location.href+"#"+text);
alert("Link copied!");
}

</script>

</body>
</html>
