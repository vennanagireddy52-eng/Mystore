<!DOCTYPE html>

<title>Affiliate Store</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.hidden{display:none}

/* ---------- STORE LAYER ---------- */

#stores{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
}

.store{
font-size:28px;
font-weight:bold;
background:white;
padding:25px 60px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
cursor:pointer;
}

/* ---------- STICKY SWITCH ---------- */

#switchBar{
position:sticky;
top:0;
background:white;
display:flex;
justify-content:center;
gap:20px;
padding:10px;
z-index:999;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

/* ---------- SEARCH ---------- */

.search{
width:100%;
padding:12px;
border:none;
outline:none;
font-size:16px;
}

/* ---------- GRID (Pinterest Style) ---------- */

.grid{
column-count:2;
column-gap:0;
}

@media(min-width:700px){
.grid{column-count:4;}
}

.card{
break-inside:avoid;
background:white;
margin:0;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.card h3{
margin:8px;
}

.desc{
font-size:13px;
padding:0 8px 10px;
}

/* ---------- SHARE BUTTON ---------- */

.share{
background:black;
color:white;
padding:6px;
margin:8px;
text-align:center;
font-size:12px;
}

.highlight{
outline:4px solid orange;
}

</style>
</head>

<body>

<!-- ================= LAYER 1 ================= -->

<div id="stores">
<div class="store" onclick="openStore('india')">🇮🇳 INDIA STORE</div>
<div class="store" onclick="openStore('us')">🇺🇸 US STORE</div>
</div>

<!-- ================= LAYER 2 ================= -->

<div id="categories" class="hidden">

<div id="switchBar">
<button onclick="openStore('india')">India</button>
<button onclick="openStore('us')">US</button>
</div>

<input class="search" placeholder="Search categories..." onkeyup="searchCategory(this.value)">

<div id="categoryGrid" class="grid"></div>

</div>

<div id="products" class="hidden">

<div id="switchBar">
<button onclick="backCategories()">⬅ Categories</button>

<input class="search" placeholder="Search products..." onkeyup="searchProduct(this.value)">

/* ---------------- NAVIGATION ---------------- */

let currentStore="";
let currentCategory="";

function openStore(store){
currentStore=store;
document.getElementById("stores").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");

loadCategories();
}

function loadCategories(){
let grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(storeData[currentStore]).forEach(cat=>{

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<h3>${cat}</h3>
<div class="desc">${storeData[currentStore][cat].desc}</div>
<div class="share" onclick="share(event,'category','${cat}')">Share</div>
</div>`;
});
}

function openCategory(cat){
currentCategory=cat;
document.getElementById("categories").classList.add("hidden");
document.getElementById("products").classList.remove("hidden");

let grid=document.getElementById("productGrid");
grid.innerHTML="";

storeData[currentStore][cat].products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="desc">${p.price} | ${p.rating}</div>
<div class="desc">${p.desc}</div>
<div class="share" onclick="share(event,'product','${p.name}')">Share</div>
</div>`;
});
}

function backCategories(){
document.getElementById("products").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");
}

/* ---------------- SEARCH ---------------- */

function searchCategory(q){
q=q.toLowerCase();
document.querySelectorAll("#categoryGrid .card")
.forEach(c=>c.style.display=
c.innerText.toLowerCase().includes(q)?"block":"none");
}

function searchProduct(q){
q=q.toLowerCase();
document.querySelectorAll("#productGrid .card")
.forEach(c=>c.style.display=
c.innerText.toLowerCase().includes(q)?"block":"none");
}

/* ---------------- SHARE LINKS ---------------- */

function share(e,type,name){
e.stopPropagation();
let url=location.origin+location.pathname+
`?store=${currentStore}&${type}=${encodeURIComponent(name)}`;
navigator.clipboard.writeText(url);
alert("Link copied!");
}

</script>
