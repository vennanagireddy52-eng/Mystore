<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* ---------- STORE LAYER ---------- */

#storeLayer{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.storeBtn{
  width:70%;
  padding:25px;
  font-size:22px;
  border:none;
  color:white;
  cursor:pointer;
}

.india{background:#ff5722;}
.us{background:black;}

/* ---------- TOP BAR ---------- */

.topbar{
  position:sticky;
  top:0;
  display:flex;
  z-index:1000;
}

.topbar button{
  flex:1;
  padding:15px;
  border:none;
  color:white;
}

.active{background:#ff5722;}
.inactive{background:black}

/* ---------- GRID ---------- */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}

.card{
  background:white;
}

.card img{
  width:100%;
}

.content{
  padding:10px;
}

.share{
  border:1px solid black;
  padding:5px 10px;
  background:white;
}
</style>
</head>

<body>

<!-- LAYER 1 -->
<div id="storeLayer">
  <button class="storeBtn india" onclick="openStore('India')">
    INDIA STORE
  </button>

  <button class="storeBtn us" onclick="openStore('US')">
    US STORE
  </button>
</div>

<!-- LAYER 2 -->
<div id="categoryLayer" style="display:none">

<div class="topbar">
  <button id="indiaBtn" onclick="switchStore('India')">India</button>
  <button id="usBtn" onclick="switchStore('US')">US</button>
</div>

<input id="catSearch" placeholder="Search categories..."
oninput="renderCategories()"
style="width:100%;padding:12px;border:none">

<div id="categories" class="grid"></div>

</div>

<!-- LAYER 3 -->
<div id="productLayer" style="display:none">

<input id="prodSearch" placeholder="Search products..."
oninput="renderProducts()"
style="width:100%;padding:12px;border:none">

<div id="products" class="grid"></div>

</div>

<script>

/* ================= DATA ================= */
/* yesterday + today products merged */

const products=[

{store:"India",category:"Tech",name:"JBL Speaker",price:"₹2799",rating:"4⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp"},

{store:"US",category:"Tech",name:"JBL Speaker",price:"$97",rating:"4.7⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp"},

{store:"India",category:"Travel",name:"6 Pack Bags",price:"₹799",rating:"4.3⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg"},

{store:"US",category:"Travel",name:"6 Pack Bags",price:"$27",rating:"4.8⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/4c468d90-ae53-4139-90f5-507fc3fb2508.jpg"},

{store:"India",category:"Home",name:"Photo Frames",price:"₹999",rating:"4.6⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp"},

{store:"US",category:"Home",name:"Photo Frames",price:"$19",rating:"4.6⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp"},

{store:"India",category:"Fashion",name:"Hoodie",price:"₹899",rating:"4.1⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/37be5e34-5bb5-4705-a06d-fd2a00a108dc.jpg"},

{store:"US",category:"Fashion",name:"Hoodie",price:"$35",rating:"4.3⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/84666b61-2360-42e9-b4d3-283f8e2f4292.jpg"},

/* yesterday */
{store:"India",category:"Tech",name:"Logitech Mouse",price:"₹790",rating:"4.2⭐"},
{store:"US",category:"Tech",name:"Logitech Mouse",price:"$13",rating:"4.5⭐"}

];

let currentStore="";
let currentCategory="";

/* ================= NAVIGATION ================= */

function openStore(store){
  currentStore=store;
  document.getElementById("storeLayer").style.display="none";
  document.getElementById("categoryLayer").style.display="block";
  renderCategories();
}

function switchStore(store){
  currentStore=store;
  renderCategories();
}

/* ================= CATEGORY ================= */

function renderCategories(){

const grid=document.getElementById("categories");
grid.innerHTML="";

const search=document.getElementById("catSearch").value.toLowerCase();

const cats=[...new Set(
products.filter(p=>p.store===currentStore)
.map(p=>p.category)
)];

cats.filter(c=>c.toLowerCase().includes(search))
.forEach(cat=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="content">
<h3>${cat}</h3>
<p>Trending products and essentials curated for smart shoppers.</p>
<button class="share" onclick="shareCategory('${cat}')">Share</button>
</div>
`;

card.onclick=()=>{
currentCategory=cat;
document.getElementById("categoryLayer").style.display="none";
document.getElementById("productLayer").style.display="block";
renderProducts();
};

grid.appendChild(card);
});
}

/* ================= PRODUCTS ================= */

function renderProducts(){

const grid=document.getElementById("products");
grid.innerHTML="";

const search=document.getElementById("prodSearch").value.toLowerCase();

products
.filter(p=>p.store===currentStore && p.category===currentCategory)
.filter(p=>p.name.toLowerCase().includes(search))
.forEach(p=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img||''}">
<div class="content">
<h4>${p.name}</h4>
<p>${p.price} • ${p.rating}</p>
<p>High quality product loved by users worldwide offering durability, style, reliability and excellent everyday performance.</p>
<button class="share" onclick="shareProduct('${p.name}')">Share</button>
</div>
`;

grid.appendChild(card);
});
}

/* ================= SHARE LINKS ================= */

function shareCategory(cat){
navigator.clipboard.writeText(location.href+"#"+currentStore+"-"+cat);
alert("Category link copied");
}

function shareProduct(name){
navigator.clipboard.writeText(location.href+"#"+name);
alert("Product link copied");
}

</script>

</body>
</html>
