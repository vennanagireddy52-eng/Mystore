<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mobile Store</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.hidden{display:none}

/* ---------- STICKY HEADER ---------- */
#topBar{
position:sticky;
top:0;
background:#fff;
z-index:1000;
display:flex;
overflow-x:auto;
border-bottom:1px solid #ddd;
}

.storeTab{
padding:12px;
white-space:nowrap;
cursor:pointer;
font-weight:bold;
}

.activeStore{
background:black;
color:white;
}

/* ---------- SEARCH ---------- */
.search{
width:100%;
padding:12px;
border:none;
outline:none;
font-size:16px;
}

/* ---------- GRID (Pinterest style) ---------- */
.grid{
column-count:2;
column-gap:0;
}

.card{
background:white;
display:inline-block;
width:100%;
margin:0;
break-inside:avoid;
}

.card img{
width:100%;
display:block;
}

/* ---------- TEXT ---------- */
.title{
font-weight:bold;
padding:6px;
}

.desc20{
padding:0 6px 6px;
font-size:13px;
color:#555;
}

.desc100{
padding:0 6px;
font-size:13px;
color:#444;
}

.price{
padding:6px;
font-weight:bold;
color:green;
}

.rating{
padding:0 6px 6px;
color:orange;
}

/* ---------- BUTTONS ---------- */
.btn{
margin:6px;
padding:10px;
background:black;
color:white;
text-align:center;
cursor:pointer;
}

.back{
padding:10px;
background:#eee;
cursor:pointer;
text-align:center;
}

/* ---------- LAYER 1 STORES ---------- */
#stores{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
}

.storeBox{
font-size:24px;
padding:20px 40px;
background:black;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ---------- LAYER 1 ---------- -->
<div id="stores">
<div class="storeBox" onclick="openStore('India')">India Store</div>
<div class="storeBox" onclick="openStore('US')">US Store</div>
</div>

<!-- ---------- LAYER 2 ---------- -->
<div id="categoriesLayer" class="hidden">

<div id="topBar"></div>

<input class="search" placeholder="Search categories..."
oninput="searchCategories(this.value)">

<div class="back" onclick="backToStores()">⬅ Back</div>

<div id="categories" class="grid"></div>

</div>

<!-- ---------- LAYER 3 ---------- -->
<div id="productsLayer" class="hidden">

<div id="topBar2"></div>

<input class="search" placeholder="Search products..."
oninput="searchProducts(this.value)">

<div class="back" onclick="backToCategories()">⬅ Back</div>

<div id="products" class="grid"></div>

</div>

<script>

/* ---------- DATA ---------- */

const DATA={
India:{
Electronics:[
{name:"Phone",price:"₹20,000",rating:"★★★★☆",
img:"https://picsum.photos/300/300?1",
desc:"High performance smartphone designed for daily productivity, gaming, photography, and smooth multitasking experience suitable for modern users."},
{name:"Laptop",price:"₹60,000",rating:"★★★★★",
img:"https://picsum.photos/300/400?2",
desc:"Powerful lightweight laptop ideal for coding, office work, streaming, and creative tasks delivering reliable speed and long battery life."}
],
Fashion:[
{name:"T‑Shirt",price:"₹800",rating:"★★★★☆",
img:"https://picsum.photos/300/350?3",
desc:"Comfortable cotton t‑shirt perfect for casual wear offering breathable fabric, modern fit, durable stitching, and stylish everyday comfort."}
]
},

US:{
Electronics:[
{name:"Camera",price:"$900",rating:"★★★★★",
img:"https://picsum.photos/300/380?4",
desc:"Professional camera providing high resolution photography, fast autofocus, cinematic video capability, and excellent performance in all lighting conditions."}
]
}
};

/* yesterday products auto included */
const yesterdayProduct={
name:"Yesterday Special",
price:"$50",
rating:"★★★★☆",
img:"https://picsum.photos/300/330?5",
desc:"Limited previous day offer product still available for customers who missed earlier deals providing excellent value and premium quality purchase opportunity."
};

/* ---------- STATE ---------- */
let currentStore=null;
let currentCategory=null;

/* ---------- STORE SWITCHER ---------- */
function renderStoreTabs(target){
target.innerHTML="";
Object.keys(DATA).forEach(store=>{
let tab=document.createElement("div");
tab.className="storeTab"+(store===currentStore?" activeStore":"");
tab.innerText=store;
tab.onclick=()=>openStore(store);
target.appendChild(tab);
});
}

/* ---------- LAYER 1 → 2 ---------- */
function openStore(store){
currentStore=store;

document.getElementById("stores").classList.add("hidden");
document.getElementById("categoriesLayer").classList.remove("hidden");

renderStoreTabs(topBar);
showCategories();
}

/* ---------- CATEGORIES ---------- */
function showCategories(){
let container=document.getElementById("categories");
container.innerHTML="";

Object.keys(DATA[currentStore]).forEach(cat=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://picsum.photos/300/320?${cat}">
<div class="title">${cat}</div>
<div class="desc20">
Explore curated products carefully selected to match quality standards, trending styles, affordability, and customer satisfaction expectations daily.
</div>
<div class="btn" onclick="shareLink('${cat}')">Share</div>
`;

card.onclick=()=>openCategory(cat);
container.appendChild(card);

});
}

/* ---------- LAYER 2 → 3 ---------- */
function openCategory(cat){
currentCategory=cat;

document.getElementById("categoriesLayer").classList.add("hidden");
document.getElementById("productsLayer").classList.remove("hidden");

renderStoreTabs(topBar2);
showProducts();
}

/* ---------- PRODUCTS ---------- */
function showProducts(){

let list=[...DATA[currentStore][currentCategory]];
list.push(yesterdayProduct);

let container=document.getElementById("products");
container.innerHTML="";

list.forEach(p=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img}">
<div class="title">${p.name}</div>
<div class="price">${p.price}</div>
<div class="rating">${p.rating}</div>
<div class="desc100">${p.desc}</div>
<div class="btn">Buy Now</div>
<div class="btn" onclick="shareLink('${p.name}')">Share</div>
`;

container.appendChild(card);
});
}

/* ---------- SEARCH ---------- */
function searchCategories(v){
document.querySelectorAll("#categories .card")
.forEach(c=>c.style.display=
c.innerText.toLowerCase().includes(v.toLowerCase())
?"block":"none");
}

function searchProducts(v){
document.querySelectorAll("#products .card")
.forEach(c=>c.style.display=
c.innerText.toLowerCase().includes(v.toLowerCase())
?"block":"none");
}

/* ---------- BACK NAV ---------- */
function backToStores(){
categoriesLayer.classList.add("hidden");
stores.classList.remove("hidden");
}

function backToCategories(){
productsLayer.classList.add("hidden");
categoriesLayer.classList.remove("hidden");
}

/* ---------- SHARE LINK ---------- */
function shareLink(name){
const url=location.origin+location.pathname+"#"+name;
navigator.clipboard.writeText(url);
alert("Link copied!");
}

</script>

</body>
</html>
