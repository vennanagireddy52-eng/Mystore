<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Store Sync</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00B894; --bg: #f4f7f6; }
        body { margin:0; font-family: system-ui, sans-serif; background: var(--bg); overflow: hidden; }
        
        /* 📱 Layer Management */
        .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; overflow-y:auto; background: var(--bg); }
        .active { display:block; }
        
        /* 🏛️ UI Components */
        .topbar { padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; color: white; background: var(--primary); min-height: 55px; }
        .back-icon { background: rgba(255,255,255,0.2); border: none; color: white; width: 42px; height: 42px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; cursor: pointer; }
        .top-title { font-weight: bold; font-size: 18px; flex-grow: 1; }

        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background: linear-gradient(135deg, var(--primary), var(--secondary)); height: 100vh; }
        .storeCard { background: white; width:80%; max-width:300px; padding:45px 20px; margin:10px; text-align:center; border-radius:22px; font-weight:900; box-shadow:0 10px 20px rgba(0,0,0,0.1); cursor:pointer; }

        .grid { column-count:2; column-gap:10px; padding:10px; }
        .card { break-inside: avoid; background:white; margin-bottom:12px; border-radius:15px; overflow:hidden; border: 1px solid #eee; }
        .card img { width:100%; display:block; }
        .info { padding:10px; font-size: 14px; }
        .buy-btn { display:block; background:var(--secondary); color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; }
        
        #adminPanel { position: fixed; bottom: 0; width: 100%; height: 90%; background: white; z-index: 9999; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between;">
        <h2>Admin</h2><button onclick="closeAdmin()">✕</button>
    </div>
    <button onclick="copyForGithub()" style="width:100%; background:orange; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">COPY DATA</button>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hStore('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hStore('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="window.history.back()">←</button><span class="top-title" id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="window.history.back()">←</button><span class="top-title" id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "", clickCount = 0, clickTimer;

/**
 * 1. 🛡️ THE HYBRID ROUTER
 * This listens to the PHONE'S back button and the UI back button equally.
 */
window.addEventListener('popstate', (e) => {
    if (e.state && e.state.layer) {
        renderUI(e.state.layer);
    } else {
        renderUI('storeLayer');
    }
});

function renderUI(layerId) {
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    const target = document.getElementById(layerId);
    if(target) {
        target.classList.add('active');
        const btn = target.querySelector('.back-icon');
        if(btn) btn.style.display = (layerId === 'storeLayer') ? 'none' : 'flex';
    }
}

function navigateTo(layerId) {
    // This pushes the state so the browser (and hardware button) knows we moved
    history.pushState({ layer: layerId }, "", "");
    renderUI(layerId);
}

/**
 * 2. 🚀 INITIALIZE & GHOST HISTORY
 */
async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || {IND:{}, US:{}};
    }

    const p = new URLSearchParams(window.location.search);
    const s = p.get('store'), c = p.get('cat');

    // Clear current state and set base
    history.replaceState({ layer: 'storeLayer' }, "", "");

    if (s && data[s]) {
        curStore = s; renC();
        // We push Category into history silently
        history.pushState({ layer: 'catLayer' }, "", "");
        
        if (c && data[s][c]) {
            curCat = c; renP();
            // We push Product into history
            history.pushState({ layer: 'pLayer' }, "", "");
            renderUI('pLayer');
        } else {
            renderUI('catLayer');
        }
    }
}

/**
 * 3. 🏬 APP LOGIC
 */
function hStore(s) {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
        if(clickCount >= 3) {
            if(prompt("PIN:") === "1234") document.getElementById('adminPanel').style.display='flex';
        } else {
            curStore = s; renC(); navigateTo('catLayer');
        }
        clickCount = 0;
    }, 300);
}

function openC(c) {
    curCat = c; renP(); navigateTo('pLayer');
}

function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore;
    Object.keys(data[curStore] || {}).forEach(c => {
        const img = (data.META[curStore] && data.META[curStore][c]?.img) || (data[curStore][c][0]?.img);
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><img src="${getImg(img)}"><div class="info"><b>${c}</b></div></div>`;
    });
}

function renP() {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    data[curStore][curCat].forEach(p => {
        g.innerHTML += `<div class="card"><img src="${getImg(p.img)}" onclick="window.open('${p.link}')"><div class="info"><b>${p.name}</b><br>${p.price}</div><a class="buy-btn" href="${p.link}">Buy Now</a></div>`;
    });
}

function getImg(u) { return u ? `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=400` : "https://via.placeholder.com/300"; }
function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
function copyForGithub() {
    const el = document.createElement('textarea'); el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el); alert("Copied!");
}

window.onload = init;
</script>
</body>
</html>
