<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Affiliate Store</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
font-family:Segoe UI;
background:#f0f2f5;
}

.layer{display:none;min-height:100vh;}
.active{display:block;}

/* ---------- STORE ---------- */
#storeLayer{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:white;
width:80%;
max-width:300px;
padding:25px;
margin:15px;
text-align:center;
border-radius:20px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

/* ---------- TOPBAR ---------- */
.topbar{
padding:15px;
display:flex;
gap:10px;
align-items:center;
color:white;
}

.back{cursor:pointer;font-size:22px;}

.grid{
column-count:2;
column-gap:10px;
padding:15px;
}

.card{
background:white;
margin-bottom:12px;
border-radius:15px;
overflow:hidden;
position:relative;
break-inside:avoid;
}

.card img{width:100%;}

.info{padding:10px;}

.buy{
display:block;
background:#00b894;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
}

/* LINK BUTTON */
.share-btn{
position:absolute;
top:8px;
right:8px;
background:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
cursor:pointer;
}

/* ADMIN BUTTON */
#adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
border:none;
padding:12px 16px;
border-radius:30px;
z-index:9999;
cursor:pointer;
}

input,select{
width:100%;
margin:5px 0;
padding:8px;
}

button{cursor:pointer;}

</style>
</head>

<body>

<!-- ADMIN BUTTON -->
<button id="adminBtn" onclick="openAdmin()">⚙</button>

<!-- STORE -->
<div id="storeLayer" class="layer active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY -->
<div id="categoryLayer" class="layer">
<div class="topbar" style="background:#6C5CE7">
<span class="back" onclick="goHome()">⬅</span>
<b>Categories</b>
</div>
<div id="categoryGrid" class="grid"></div>
</div>

<!-- PRODUCTS -->
<div id="productLayer" class="layer">
<div class="topbar" style="background:#00B894">
<span class="back" onclick="backToCategories()">⬅</span>
<b>Products</b>
</div>
<div id="productGrid" class="grid"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminLayer" class="layer">
<div class="topbar" style="background:black">
<span class="back" onclick="goHome()">⬅</span>
<b>ADMIN PANEL</b>
</div>

<div style="padding:20px">

<h3>Add Category</h3>
<select id="adminStore">
<option value="IND">IND</option>
<option value="US">US</option>
</select>

<input id="catName" placeholder="Category Name">
<input id="catImg" placeholder="Category Image URL">

<button onclick="addCategory()">Add Category</button>

<hr>

<h3>Add Product</h3>
<input id="prodCat" placeholder="Category Name">
<input id="prodName" placeholder="Product Name">
<input id="prodImg" placeholder="Product Image URL">
<input id="prodPrice" placeholder="Price">
<input id="prodLink" placeholder="Affiliate Link">

<button onclick="addProduct()">Add Product</button>

</div>
</div>

<script>

/* ---------- DATA ---------- */

let data={
IND:{
Tech:[
{name:"JBL Speaker",img:"https://via.placeholder.com/300",price:"₹2799",link:"https://amzn.to"}
]
},
US:{}
};

let currentStore="";
let currentCategory="";

/* ---------- LAYER CONTROL ---------- */

function showLayer(id){
document.querySelectorAll(".layer").forEach(l=>l.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ---------- NAVIGATION ---------- */

function openStore(store){
currentStore=store;
showLayer("categoryLayer");
renderCategories();
}

function goHome(){
showLayer("storeLayer");
}

function backToCategories(){
showLayer("categoryLayer");
}

function openCategory(cat){
currentCategory=cat;
showLayer("productLayer");
renderProducts();
}

/* ---------- LINK COPY ---------- */

function copyLink(text,e){
e.stopPropagation();
navigator.clipboard.writeText(text);
alert("Link copied");
}

/* ---------- RENDER ---------- */

function renderCategories(){

const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{

let link=location.origin+location.pathname+
`?store=${currentStore}&cat=${cat}`;

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<button class="share-btn"
onclick="copyLink('${link}',event)">🔗</button>
<img src="${data[currentStore][cat][0].img}">
<div class="info"><b>${cat}</b></div>
</div>`;
});
}

function renderProducts(){

const grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{

grid.innerHTML+=`
<div class="card">
<button class="share-btn"
onclick="copyLink('${p.link}',event)">🔗</button>
<img src="${p.img}">
<div class="info">
<b>${p.name}</b><br>${p.price}
</div>
<a class="buy" href="${p.link}" target="_blank">Buy Now</a>
</div>`;
});
}

/* ---------- ADMIN ---------- */

function openAdmin(){
showLayer("adminLayer");
}

function addCategory(){

let store=document.getElementById("adminStore").value;
let name=document.getElementById("catName").value;
let img=document.getElementById("catImg").value;

if(!data[store]) data[store]={};

data[store][name]=[
{name:"Sample",img:img,price:"",link:"#"}
];

alert("Category Added");
}

function addProduct(){

let cat=document.getElementById("prodCat").value;

if(!data[currentStore][cat]){
alert("Category not found");
return;
}

data[currentStore][cat].push({
name:document.getElementById("prodName").value,
img:document.getElementById("prodImg").value,
price:document.getElementById("prodPrice").value,
link:document.getElementById("prodLink").value
});

alert("Product Added");
}

</script>
</body>
</html>
