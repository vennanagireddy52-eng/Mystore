<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Affiliate Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Smart Affiliate Store</h2>
<button id="adminBtn" onclick="toggleAdmin()">ADMIN</button>
</header>

<!-- STORE PAGE -->
<div id="storePage" class="page active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY PAGE -->
<div id="categoryPage" class="page">
<button onclick="goHome()">⬅ Back</button>
<div id="categoryGrid"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin">
<h3>Admin Panel</h3>

<input id="catName" placeholder="Category name">
<input id="catImg" placeholder="Category image URL">
<button onclick="addCategory()">Add Category</button>

<hr>

<input id="prodName" placeholder="Product name">
<input id="prodImg" placeholder="Product image URL">
<input id="prodPrice" placeholder="Price">
<input id="prodLink" placeholder="Affiliate link">
<button onclick="addProduct()">Add Product</button>

</div>

<script src="script.js"></script>
</body>
</html>
