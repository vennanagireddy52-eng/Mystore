<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Store Sync</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00B894; --bg: #f4f7f6; }
        body { margin:0; font-family: system-ui, sans-serif; background: var(--bg); overflow-x: hidden; }
        
        /* 📱 Layer Management */
        .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; overflow-y:auto; background: var(--bg); }
        .active { display:block; }
        
        /* 🏛️ UI Components */
        .topbar { padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; color: white; background: var(--primary); min-height: 55px; }
        .back-icon { background: rgba(255,255,255,0.2); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; cursor: pointer; }
        
        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background: linear-gradient(135deg, var(--primary), var(--secondary)); height: 100vh; }
        .storeCard { background: white; width:80%; max-width:300px; padding:40px 20px; margin:10px; text-align:center; border-radius:20px; font-weight:900; box-shadow:0 10px 20px rgba(0,0,0,0.1); cursor:pointer; }

        .grid { column-count:2; column-gap:10px; padding:10px; }
        .card { break-inside: avoid; background:white; margin-bottom:10px; border-radius:15px; overflow:hidden; position:relative; border: 1px solid #eee; }
        .card img { width:100%; display:block; }
        .info { padding:10px; font-size: 14px; }
        .buy-btn { display:block; background:var(--secondary); color:white; text-align:center; padding:10px; text-decoration:none; font-weight:bold; }

        #adminPanel { position: fixed; bottom: 0; width: 100%; height: 90%; background: white; z-index: 9999; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:black; color:white; padding:8px 20px; border-radius:20px; display:none; z-index:10000; }
    </style>
</head>
<body>

<div id="toast">Copied!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; margin-bottom:20px;">
        <h2>Admin</h2><button onclick="closeAdmin()">✕</button>
    </div>
    <button style="width:100%; padding:10px; background:orange; color:white; border:none; margin-bottom:10px;" onclick="copyForGithub()">COPY FOR GITHUB</button>
    <p><i>Edit locally, then copy and paste to your GitHub JSON file.</i></p>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hStore('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hStore('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="manualBack()">←</button><span id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="manualBack()">←</button><span id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "", clickCount = 0, clickTimer;

// 1. 🛡️ NAVIGATION CORE
function showLayer(id, push = true) {
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    const target = document.getElementById(id);
    target.classList.add('active');
    
    // Toggle Back Button Visibility
    const backBtn = target.querySelector('.back-icon');
    if(backBtn) backBtn.style.display = (id === 'storeLayer') ? 'none' : 'flex';

    if(push) history.pushState({layer: id}, "");
}

// Intercept Browser Back Button
window.onpopstate = function(e) {
    if(e.state && e.state.layer) {
        showLayer(e.state.layer, false);
    } else {
        // If no state exists (Pinterest edge case), force home
        showLayer('storeLayer', false);
    }
};

// Intercept Hardware/App Back Button manually
function manualBack() {
    history.back();
}

// 2. 🚀 PINTEREST DEEP LINK & HISTORY INJECTION
async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || {IND:{}, US:{}};
    }

    const p = new URLSearchParams(window.location.search);
    const s = p.get('store'), c = p.get('cat'), pid = p.get('prod');

    // Reset history to base
    history.replaceState({layer: 'storeLayer'}, "");

    if (s && data[s]) {
        curStore = s; renC();
        if (c && data[s][c]) {
            curCat = c; renP(pid);
            // INJECTION: Push intermediate layers so "Back" works immediately
            history.pushState({layer: 'catLayer'}, "");
            showLayer('pLayer', true); 
        } else {
            showLayer('catLayer', true);
        }
    }
}

// 3. 🏬 INTERACTION LOGIC
function hStore(s) {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
        if(clickCount >= 3) {
            if(prompt("PIN:") === "1234") document.getElementById('adminPanel').style.display='flex';
        } else {
            curStore = s; renC(); showLayer('catLayer');
        }
        clickCount = 0;
    }, 300);
}

function openC(c) { curCat = c; renP(); showLayer('pLayer'); }

function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore;
    Object.keys(data[curStore] || {}).forEach(c => {
        const img = (data.META[curStore] && data.META[curStore][c]?.img) || "";
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><img src="${getImg(img)}"><div class="info"><b>${c}</b></div></div>`;
    });
}

function renP(sid=null) {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    data[curStore][curCat].forEach(p => {
        const url = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(curCat)}&prod=${p.id}`;
        g.innerHTML += `<div class="card" id="${p.id}"><img src="${getImg(p.img)}" onclick="window.open('${p.link}')"><div class="info"><b>${p.name}</b><br>${p.price}</div><a class="buy-btn" href="${p.link}">Buy Now</a></div>`;
    });
    if(sid) setTimeout(() => document.getElementById(sid)?.scrollIntoView(), 500);
}

function getImg(u) { return u ? `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=400` : "https://via.placeholder.com/300"; }
function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
function copyForGithub() {
    const el = document.createElement('textarea'); el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el); alert("JSON Copied!");
}

window.onload = init;
</script>
</body>
</html>
