<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Affiliate Store</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f4f4f4;
}

/* STORE SWITCH */
.store-switch{
  background:black;
  text-align:center;
  padding:15px;
}

.store-switch button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.store-switch button.active{
  background:#ff6600;
}

/* CATEGORY */
.category{
  margin:30px auto;
  width:90%;
  max-width:1100px;
}

.category img.banner{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

.category h2{
  margin:10px 0;
}

/* PRODUCT GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:160px;
  object-fit:contain;
}

.buy{
  display:inline-block;
  margin-top:10px;
  padding:8px 15px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="store-switch">
  <button onclick="switchStore('India')" class="active" id="btnIndia">🇮🇳 India Store</button>
  <button onclick="switchStore('US')" id="btnUS">🇺🇸 US Store</button>
</div>

<div id="store"></div>

<script>

let currentStore="India";

/* PRODUCTS */
const products=[

{
category:"Tech",
name:"JBL Bluetooth Speaker",
indiaPrice:"₹2799",
usPrice:"$97",
indiaLink:"https://amzn.to/40OZeuH",
usLink:"https://amzn.to/3PvtdW7",
indiaImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
usImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp"
},

{
category:"Travel",
name:"6 Pack Travel Bags",
indiaPrice:"₹799",
usPrice:"$27",
indiaLink:"https://amzn.to/47iPnky",
usLink:"https://amzn.to/4uRA649",
indiaImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
usImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/4c468d90-ae53-4139-90f5-507fc3fb2508.jpg"
},

{
category:"Home",
name:"10 Pack Picture Frames",
indiaPrice:"₹999",
usPrice:"$19",
indiaLink:"https://amzn.to/481afgb",
usLink:"https://amzn.to/3O0WgjM",
indiaImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp",
usImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp"
},

{
category:"Fashion",
name:"Men's Hoodie",
indiaPrice:"₹899",
usPrice:"$35",
indiaLink:"https://amzn.to/4swz0ZY",
usLink:"https://amzn.to/488Nuaee",
indiaImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/37be5e34-5bb5-4705-a06d-fd2a00a108dc.jpg",
usImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/84666b61-2360-42e9-b4d3-283f8e2f4292.jpg"
}

];

function renderStore(){

const store=document.getElementById("store");
store.innerHTML="";
const categories={};

products.forEach(p=>{

if(!categories[p.category]){
categories[p.category]=[];
}
categories[p.category].push(p);

});

Object.keys(categories).forEach(cat=>{

const section=document.createElement("div");
section.className="category";

const banner=document.createElement("img");
banner.className="banner";
banner.src=currentStore==="India"
?categories[cat][0].indiaImg
:categories[cat][0].usImg;

const title=document.createElement("h2");
title.innerText=cat;

const grid=document.createElement("div");
grid.className="grid";

categories[cat].forEach(p=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${currentStore==="India"?p.indiaImg:p.usImg}">
<h3>${p.name}</h3>
<p>${currentStore==="India"?p.indiaPrice:p.usPrice}</p>
<a class="buy" target="_blank"
href="${currentStore==="India"?p.indiaLink:p.usLink}">
View ${cat}
</a>
`;

grid.appendChild(card);

});

section.appendChild(banner);
section.appendChild(title);
section.appendChild(grid);
store.appendChild(section);

});

}

function switchStore(store){
currentStore=store;

document.getElementById("btnIndia").classList.remove("active");
document.getElementById("btnUS").classList.remove("active");

document.getElementById(
store==="India"?"btnIndia":"btnUS"
).classList.add("active");

renderStore();
}

renderStore();

</script>
</body>
</html>
