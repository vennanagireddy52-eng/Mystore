<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-15GKXJTXQF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-15GKXJTXQF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Store Sync</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00B894; --bg: #f4f7f6; }
        body { margin:0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        
        /* 📱 Layer System */
        .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; overflow-y:auto; background: var(--bg); }
        .active { display:block; }
        
        /* 🏛️ UI Components */
        .topbar { padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; color: white; background: var(--primary); min-height: 55px; }
        .back-icon { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 22px; margin-right: 12px; cursor: pointer; }
        .top-title { font-weight: bold; font-size: 18px; flex-grow: 1; }

        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background: linear-gradient(135deg, var(--primary), var(--secondary)); height: 100vh; }
        .storeCard { background: white; width:80%; max-width:300px; padding:45px 20px; margin:10px; text-align:center; border-radius:20px; font-weight:900; box-shadow:0 10px 20px rgba(0,0,0,0.15); cursor:pointer; }

        .grid { column-count:2; column-gap:10px; padding:10px; }
        .card { break-inside: avoid; background:white; margin-bottom:10px; border-radius:15px; overflow:hidden; position:relative; border: 1px solid #eee; }
        .card img { width:100%; display:block; background: #eee; min-height: 120px; }
        .info { padding:10px; font-size: 14px; }
        .price { color: var(--secondary); font-weight: 800; display: block; margin-top: 5px; }
        .buy-btn { display:block; background:var(--secondary); color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; }

        #adminPanel { position: fixed; bottom: 0; width: 100%; height: 92%; background: white; z-index: 9999; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; border-radius: 20px 20px 0 0; }
        #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 25px; border-radius:30px; display:none; z-index:10000; }
    </style>
</head>
<body>

<div id="toast">Copied!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2>Admin Panel</h2><button onclick="closeAdmin()">✕</button>
    </div>
    <button onclick="copyForGithub()" style="width:100%; background:orange; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; margin-top:20px;">📋 COPY FOR GITHUB</button>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hStore('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hStore('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="history.back()">←</button><span class="top-title" id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="history.back()">←</button><span class="top-title" id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "", clickCount = 0, clickTimer;

/**
 * 1. 🛡️ HASH-BASED NAVIGATION ENGINE
 * This is the only way to guarantee the physical back button works in Pinterest.
 */
window.onhashchange = function() {
    const hash = window.location.hash.replace('#', '');
    if (!hash) {
        renderLayer('storeLayer');
    } else {
        const parts = hash.split('/');
        curStore = parts[0];
        if (parts[1]) {
            curCat = decodeURIComponent(parts[1]);
            renP(); // Render products
            renderLayer('pLayer');
        } else {
            renC(); // Render categories
            renderLayer('catLayer');
        }
    }
};

function renderLayer(id) {
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    const target = document.getElementById(id);
    if(target) {
        target.classList.add('active');
        const backBtn = target.querySelector('.back-icon');
        if(backBtn) backBtn.style.display = (id === 'storeLayer') ? 'none' : 'flex';
    }
}

/**
 * 2. 🚀 INITIALIZE
 */
async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || {IND:{}, US:{}};
    }

    // Check if we arrived via a deep link (e.g., ?store=IND&cat=Tools)
    const params = new URLSearchParams(window.location.search);
    const s = params.get('store'), c = params.get('cat');

    if (s && c) {
        // Redirect standard URL parameters to Hash navigation for Pinterest compatibility
        window.location.hash = `#${s}/${encodeURIComponent(c)}`;
    } else if (window.location.hash) {
        // If they arrived with a hash already, trigger the router
        window.onhashchange();
    } else {
        renderLayer('storeLayer');
    }
}

/**
 * 3. 🏬 UI ACTIONS
 */
function hStore(s) {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
        if(clickCount >= 3) {
            if(prompt("PIN:") === "1234") document.getElementById('adminPanel').style.display='flex';
        } else {
            window.location.hash = `#${s}`;
        }
        clickCount = 0;
    }, 300);
}

function openC(c) {
    window.location.hash = `#${curStore}/${encodeURIComponent(c)}`;
}

function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore;
    Object.keys(data[curStore] || {}).forEach(c => {
        const img = (data.META[curStore] && data.META[curStore][c]?.img) || (data[curStore][c][0]?.img);
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><img src="${getImg(img)}"><div class="info"><b>${c}</b></div></div>`;
    });
}

function renP() {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    if(!data[curStore] || !data[curStore][curCat]) return;
    data[curStore][curCat].forEach(p => {
        g.innerHTML += `
        <div class="card" id="${p.id}">
            <img src="${getImg(p.img)}" onclick="window.open('${p.link}','_blank')">
            <div class="info"><b>${p.name}</b><span class="price">${p.price}</span></div>
            <a class="buy-btn" href="${p.link}" target="_blank">Buy Now</a>
        </div>`;
    });
}

function getImg(u) { return u ? `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=400` : "https://via.placeholder.com/300"; }
function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
function copyForGithub() {
    const el = document.createElement('textarea'); el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el); alert("Copied!");
}

window.onload = init;
</script>
</body>
</html>
