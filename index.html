<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystore</title>

<style>
body{
    font-family:Arial;
    margin:0;
    padding:20px;
}
.card{
    border:1px solid #ddd;
    padding:15px;
    margin:10px 0;
}
a{
    text-decoration:none;
    color:blue;
}
</style>
</head>

<body>

<h2 id="title">My Store</h2>
<div id="app"></div>

<script>

/* ===========================
   SIMPLE STORE DEMO DATA
=========================== */

const products = {
    Tech:[
        {id:"p1",name:"Wireless Earbuds"},
        {id:"p2",name:"Bluetooth Mouse"}
    ],
    Fashion:[
        {id:"p3",name:"Men Shirt"}
    ]
};


/* ===========================
   ROUTER (URL BASED VIEW)
=========================== */

function render(){

    const params = new URLSearchParams(location.search);
    const store = params.get("store");
    const cat   = params.get("cat");
    const prod  = params.get("prod");

    const app = document.getElementById("app");

    /* STORE PAGE */
    if(!cat && !prod){
        document.getElementById("title").innerText="Store";

        app.innerHTML = `
            <div class="card">
                <a href="?store=IND&cat=Tech">Tech Category</a>
            </div>
            <div class="card">
                <a href="?store=IND&cat=Fashion">Fashion Category</a>
            </div>
        `;
        return;
    }

    /* CATEGORY PAGE */
    if(cat && !prod){

        document.getElementById("title").innerText=cat+" Category";

        let html="";

        products[cat].forEach(p=>{
            html+=`
            <div class="card">
                <a href="?store=IND&cat=${cat}&prod=${p.id}">
                    ${p.name}
                </a>
            </div>`;
        });

        app.innerHTML=html;
        return;
    }

    /* PRODUCT PAGE */
    if(prod){

        document.getElementById("title").innerText="Product";

        app.innerHTML=`
        <div class="card">
            <h3>Product ID: ${prod}</h3>
            <p>Opened from Pinterest.</p>
        </div>`;
    }
}

render();
window.addEventListener("popstate", render);


/* =====================================
   PINTEREST BACK NAVIGATION SYSTEM
===================================== */

(function(){

function fromPinterest(){
    const ref=document.referrer.toLowerCase();
    const ua=navigator.userAgent.toLowerCase();

    return(
        ref.includes("pinterest")||
        ref.includes("pin.it")||
        ua.includes("pinterest")
    );
}

const url=new URL(location.href);

const store=url.searchParams.get("store");
const cat=url.searchParams.get("cat");
const prod=url.searchParams.get("prod");

if(!fromPinterest()) return;
if(!prod) return;

if(sessionStorage.getItem("pin_history_created")) return;

sessionStorage.setItem("pin_history_created","yes");

/* PRODUCT */
history.replaceState(
    {layer:"product"},
    "",
    `?store=${store}&cat=${cat}&prod=${prod}`
);

/* CATEGORY */
history.pushState(
    {layer:"category"},
    "",
    `?store=${store}&cat=${cat}`
);

/* STORE */
history.pushState(
    {layer:"store"},
    "",
    `?store=${store}`
);

})();


/* =====================================
   BACK BUTTON CONTROLLER
===================================== */

window.addEventListener("popstate",function(event){

if(!event.state){
    render();
    return;
}

const params=new URLSearchParams(location.search);

/* Product → Category */
if(event.state.layer==="category"){
    params.delete("prod");
    history.replaceState({}, "", "?"+params.toString());
    render();
    return;
}

/* Category → Store */
if(event.state.layer==="store"){
    params.delete("prod");
    params.delete("cat");
    history.replaceState({}, "", "?"+params.toString());
    render();
    return;
}

render();

});

</script>

</body>
</html>
