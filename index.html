<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>

    <script type="text/javascript">
    (function() {
        /**
         * 1. CONFIGURATION 
         * IMPORTANT: Change these placeholder URLs to your actual website links.
         * Must include https://
         */
        const URL_STORE    = "https://yourstore.com/shop"; 
        const URL_CATEGORY = "https://yourstore.com/category-slug";
        const URL_PRODUCT  = window.location.href;

        // Detection: Only run if coming from Pinterest/Pin.it
        const ref = document.referrer;
        const isPinterest = ref.includes("pinterest.com") || ref.includes("pin.it");
        const isAlreadySet = sessionStorage.getItem('nav_complete');

        // Logic: Build the "Stepped" History
        if (isPinterest && !isAlreadySet) {
            try {
                // Replace current entry (Pinterest) with Store
                window.history.replaceState({ step: 'store' }, '', URL_STORE);

                // Push Category
                window.history.pushState({ step: 'category' }, '', URL_CATEGORY);

                // Push Product (so user stays here)
                window.history.pushState({ step: 'product' }, '', URL_PRODUCT);

                // Prevent infinite loops
                sessionStorage.setItem('nav_complete', 'true');
            } catch (e) {
                console.error("Navigation setup failed", e);
            }
        }

        /**
         * 2. THE CRITICAL FIX FOR "STORE NOT OPENING"
         * This forces the mobile browser to RE-LOAD the page content 
         * whenever the back button (triangle) is clicked.
         */
        window.addEventListener('popstate', function(event) {
            // When the URL changes due to the back button, 
            // this line forces the browser to actually navigate to that URL.
            window.location.assign(window.location.href);
        });
    })();
    </script>

    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            background: #fdfdfd; 
        }
        .product-wrapper { 
            max-width: 450px; 
            width: 100%; 
            padding: 20px; 
            text-align: center; 
        }
        .image-box { 
            background: #eee; 
            height: 350px; 
            border-radius: 15px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #999;
        }
        .pin-badge {
            background: #E60023;
            color: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        h1 { font-size: 28px; margin: 10px 0; }
        .buy-now { 
            display: block; 
            background: #000; 
            color: #fff; 
            padding: 18px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-top: 25px; 
        }
    </style>
</head>
<body>

    <div class="product-wrapper">
        <div class="pin-badge">Found on Pinterest</div>
        <div class="image-box">Product Image Here</div>
        <h1>Premium Collection Item</h1>
        <p>This page is set up with 3-step back navigation.</p>
        
        <a href="#" class="buy-now">Buy Now</a>

        <p style="margin-top:40px; color:#999; font-size:12px;">
            1. Back (Triangle) -> Category<br>
            2. Back (Triangle) -> Store<br>
            3. Back (Triangle) -> Pinterest
        </p>
    </div>

</body>
</html>
