<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Cloud Store Ultimate</title>
    <style>
        body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#f4f7f6; color: #1a1a1a; user-select: none; -webkit-tap-highlight-color: transparent; }
        .layer { display:none; position:absolute; top:0; left:0; width:100%; height:100%; overflow:auto; background:#f4f7f6; padding-bottom: 100px; }
        .active { display:block; }
        
        /* HOME SCREEN */
        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#6C5CE7,#00B894); min-height: 100vh; }
        .storeCard { background:white; width:80%; max-width:300px; padding:45px 20px; margin:15px; text-align:center; border-radius:25px; font-size:22px; font-weight:900; box-shadow:0 15px 35px rgba(0,0,0,0.2); cursor:pointer; border:none; transition: 0.2s; }
        .storeCard:active { transform: scale(0.95); }

        /* NAVIGATION */
        .topbar { padding:15px; display:flex; gap:12px; align-items:center; position:sticky; top:0; z-index:100; color:white; background:#6C5CE7; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-title { font-weight: bold; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* GRID SYSTEM */
        .grid { column-count:2; column-gap:12px; padding:12px; }
        .card { break-inside: avoid; background:white; margin-bottom:15px; border-radius:18px; overflow:hidden; position:relative; box-shadow:0 5px 15px rgba(0,0,0,0.06); cursor:pointer; }
        .card img { width:100%; display:block; object-fit: contain; min-height: 140px; max-height: 220px; background: #fff; }
        .info { padding:12px; }
        .price { font-weight: 800; color: #00b894; font-size: 16px; margin-top: 5px; display: block; }
        
        .link-symbol { position:absolute; top:10px; right:10px; background:white; border: none; border-radius: 50%; width: 36px; height: 36px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 10; font-size: 16px; color: #6C5CE7; display: flex; align-items: center; justify-content: center; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; border-radius: 0 0 18px 18px; font-size: 14px; }

        /* ADMIN CONSOLE */
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 92%; background: white; z-index: 2000; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 50px rgba(0,0,0,0.4); display: none; flex-direction: column; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        #adminPanel.active { display: flex; }
        .admin-section { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        input, textarea, select, .btn-main { width: 100%; padding: 14px; margin: 6px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        .btn-main { background: #6C5CE7; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-del { background: #ff7675 !important; }
        
        #toast { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:white; padding:12px 25px; border-radius:30px; display:none; z-index:3000; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div id="toast">Copied to Clipboard!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#6C5CE7;">Cloud Sync</h2>
        <button onclick="closeAdmin()" style="border:none; background:#eee; width:45px; height:45px; border-radius:50%; font-size:20px;">✕</button>
    </div>
    
    <div class="admin-section" style="border: 2px solid orange; background: #fffcf5;">
        <h3 style="margin-top:0; color:orange;">1. Permanent Save</h3>
        <button class="btn-main" onclick="copyForGithub()" style="background:orange;">📋 COPY FOR GITHUB</button>
        <p style="font-size:11px; color:#666;">After clicking, paste into your <b>store-data.json</b> on GitHub.</p>
    </div>

    <div class="admin-section">
        <h3>2. Categories</h3>
        <select id="manageStore" onchange="syncUI()"><option value="IND">🇮🇳 India Store</option><option value="US">🇺🇸 US Store</option></select>
        <select id="editCatSelect" onchange="loadCat()"><option value="">-- Add/Edit Category --</option></select>
        <input type="text" id="catInp" placeholder="Category Name">
        <input type="text" id="catImgInp" placeholder="Category Image URL (Direct Link)">
        <div style="display:flex; gap:8px;">
            <button class="btn-main" onclick="saveCat()">Save Cat</button>
            <button class="btn-main btn-del" onclick="deleteCatManual()">Delete Cat</button>
        </div>
    </div>

    <div class="admin-section">
        <h3>3. Products</h3>
        <select id="pCatSel" onchange="syncPList()"><option value="">Choose Category First</option></select>
        <select id="editPSel" onchange="loadP()"><option value="">-- New Product --</option></select>
        <hr style="border:0; border-top:1px solid #ddd; margin:15px 0;">
        <input type="text" id="pName" placeholder="Name"><textarea id="pDesc" placeholder="Description"></textarea>
        <input type="text" id="pPrice" placeholder="Price (e.g. ₹999)"><input type="text" id="pImg" placeholder="Image URL">
        <input type="text" id="pLink" placeholder="Affiliate Link">
        <button class="btn-main" onclick="saveP()" style="background:#00B894;">Save Product</button>
        <button class="btn-main btn-del" onclick="deletePManual()">Delete Product</button>
    </div>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hSec('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hSec('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><span onclick="goHome()" style="cursor:pointer; font-size:24px; padding:0 10px;">⬅</span><span class="top-title" id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><span onclick="backC()" style="cursor:pointer; font-size:24px; padding:0 10px;">⬅</span><span class="top-title" id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{} };
let curStore = "", curCat = "", cc = 0;

function getImg(u) {
    if(!u) return "https://via.placeholder.com/300x200?text=No+Image";
    return `https://images.weserv.nl/?url=${encodeURIComponent(u)}&default=https://via.placeholder.com/300x200?text=Error`;
}

async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        const cloud = await res.json();
        if(cloud && cloud.IND) data = cloud;
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || { IND:{}, US:{} };
    }
    saveLoc(); syncUI(); checkLink();
}

// ADMIN CORE
function syncUI() {
    const s = document.getElementById('manageStore').value;
    const cSel = document.getElementById('editCatSelect'), pCSel = document.getElementById('pCatSel');
    let h = '<option value="">-- Select --</option>';
    Object.keys(data[s]).forEach(c => h += `<option value="${c}">${c}</option>`);
    cSel.innerHTML = h; pCSel.innerHTML = h;
}
function syncPList() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value;
    const pSel = document.getElementById('editPSel');
    pSel.innerHTML = '<option value="">-- New --</option>';
    if(c && data[s][c]) data[s][c].forEach(p => pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
}
function loadCat() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('editCatSelect').value;
    document.getElementById('catInp').value = c;
    document.getElementById('catImgInp').value = (c && data[s][c]._img) ? data[s][c]._img : "";
}
function saveCat() {
    const s = document.getElementById('manageStore').value, old = document.getElementById('editCatSelect').value;
    const n = document.getElementById('catInp').value.trim(), img = document.getElementById('catImgInp').value;
    if(!n) return;
    if(old && old!==n) { data[s][n]=data[s][old]; delete data[s][old]; }
    else if(!data[s][n]) data[s][n]=[];
    data[s][n]._img = img;
    saveLoc(); syncUI(); alert("Category Saved locally! Click Orange button next.");
}
function deleteCatManual() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('editCatSelect').value;
    if(c && confirm(`Delete "${c}"?`)) { delete data[s][c]; saveLoc(); syncUI(); }
}
function loadP() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value, id = document.getElementById('editPSel').value;
    const p = data[s][c]?.find(x => x.id === id);
    ['pName','pDesc','pPrice','pImg','pLink'].forEach(k => document.getElementById(k).value = p ? p[k.substring(1).toLowerCase()] : "");
}
function saveP() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value, id = document.getElementById('editPSel').value;
    if(!c) return alert("Select Category");
    let p = { id: id || "p"+Date.now(), name: document.getElementById('pName').value, desc: document.getElementById('pDesc').value, price: document.getElementById('pPrice').value, img: document.getElementById('pImg').value, link: document.getElementById('pLink').value };
    if(id) { const i = data[s][c].findIndex(x=>x.id===id); data[s][c][i]=p; } else data[s][c].push(p);
    saveLoc(); syncPList(); alert("Product Saved Locally!");
}
function deletePManual() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value, id = document.getElementById('editPSel').value;
    if(id && confirm("Delete product?")) { data[s][c] = data[s][c].filter(x => x.id !== id); saveLoc(); syncPList(); }
}

// RENDERING
function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore === "IND" ? "India Store" : "US Store";
    Object.keys(data[curStore]).forEach(c => {
        const l = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(c)}`;
        const img = data[curStore][c]._img || (data[curStore][c][0]?.img);
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><button class="link-symbol" onclick="cp('${l}',event)">🔗</button><img src="${getImg(img)}"><div class="info"><b>${c}</b><span style="font-size:10px; color:#999; display:block; margin-top:3px;">${data[curStore][c].length} Items</span></div></div>`;
    });
}
function renP(hId=null) {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    (data[curStore][curCat]||[]).forEach(p => {
        const l = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(curCat)}&prod=${p.id}`;
        g.innerHTML += `<div class="card" id="${p.id}"><button class="link-symbol" onclick="cp('${l}',event)">🔗</button><img src="${getImg(p.img)}"><div class="info"><b>${p.name}</b><p style="font-size:11px;color:#666;line-height:1.3;margin:5px 0;">${p.desc}</p><span class="price">${p.price}</span></div><a class="buy-btn" href="${p.link}" target="_blank">View Product</a></div>`;
    });
    if(hId) setTimeout(()=>document.getElementById(hId)?.scrollIntoView({behavior:'smooth',block:'center'}),600);
}

// UTILS
function saveLoc() { localStorage.setItem('storeData', JSON.stringify(data)); }
function copyForGithub() { navigator.clipboard.writeText(JSON.stringify(data,null,2)); alert("Copied! Paste into GitHub now."); }
function hSec(s) { cc++; setTimeout(() => { if(cc>=3) { if(prompt("Pass")==="1234") document.getElementById('adminPanel').classList.add('active'); } else if(cc===1) { curStore=s; renC(); show('catLayer'); } cc=0; }, 400); }
function openC(c) { curCat=c; renP(); show('pLayer'); }
function cp(t,e) { e.stopPropagation(); navigator.clipboard.writeText(t); const ts=document.getElementById('toast'); ts.style.display='block'; setTimeout(()=>ts.style.display='none',2000); }
function show(id) { document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome() { show('storeLayer'); }
function backC() { show('catLayer'); }
function closeAdmin() { document.getElementById('adminPanel').classList.remove('active'); }
function checkLink() { const p=new URLSearchParams(location.search), s=p.get('store'), c=p.get('cat'), id=p.get('prod'); if(s && data[s]){ curStore=s; if(c && data[s][c]){ curCat=c; renP(id); show('pLayer'); } else { renC(); show('catLayer'); } } }
window.onload = init;
</script>
</body>
</html>
