<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-15GKXJTXQF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-15GKXJTXQF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Store Sync</title>
    <style>
        :root { --primary: #6C5CE7; --secondary: #00B894; --bg: #f4f7f6; }
        body { margin:0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }
        
        /* 📱 Stack Layers */
        .layer { position:fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); transform: translateX(100%); transition: transform 0.3s ease-in-out; z-index: 10; overflow-y: auto; }
        .layer.active { transform: translateX(0); z-index: 20; }
        #storeLayer { transform: translateX(0); display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); z-index: 5; }

        /* 🏛️ Navigation UI */
        .topbar { padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; color: white; background: var(--primary); min-height: 55px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-btn-ui { background: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 18px; border-radius: 30px; font-weight: bold; font-size: 14px; margin-right: 12px; cursor: pointer; display: flex; align-items: center; }
        
        .storeCard { background: white; width:80%; max-width:300px; padding:50px 20px; margin:15px; text-align:center; border-radius:25px; font-weight:900; font-size: 22px; box-shadow:0 15px 30px rgba(0,0,0,0.1); cursor:pointer; }

        .grid { column-count:2; column-gap:10px; padding:10px; }
        .card { break-inside: avoid; background:white; margin-bottom:12px; border-radius:18px; overflow:hidden; border: 1px solid #eee; }
        .card img { width:100%; display:block; }
        .info { padding:10px; font-size: 14px; }
        .buy-btn { display:block; background:var(--secondary); color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; }

        /* ⚙️ Admin */
        #adminPanel { position: fixed; bottom: 0; width: 100%; height: 95%; background: white; z-index: 9999; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; overflow-y: auto; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="navTo('catLayer', 'IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="navTo('catLayer', 'US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar">
        <button class="back-btn-ui" onclick="goBack()">← BACK</button>
        <span id="stTitle">Categories</span>
    </div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar">
        <button class="back-btn-ui" onclick="goBack()">← BACK</button>
        <span id="ctTitle">Products</span>
    </div>
    <div id="pGrid" class="grid"></div>
</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:var(--primary);">Cloud Admin</h2>
        <button onclick="closeAdmin()" style="border:none; background:#eee; width:45px; height:45px; border-radius:50%; font-size:20px;">✕</button>
    </div>
    <button onclick="copyForGithub()" style="width:100%; background:orange; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold;">📋 COPY DATA FOR GITHUB</button>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "", clickCount = 0, clickTimer;
let navStack = ['storeLayer']; // Manual navigation history

/**
 * 1. 🛡️ VIRTUAL NAVIGATION
 */
function navTo(layerId, storeId = null) {
    if (storeId) {
        curStore = storeId;
        renderCats();
    }
    
    // Add to stack and show
    if (navStack[navStack.length - 1] !== layerId) {
        navStack.push(layerId);
    }
    
    updateUI();
}

function goBack() {
    if (navStack.length > 1) {
        navStack.pop();
        updateUI();
    }
}

function updateUI() {
    const currentId = navStack[navStack.length - 1];
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    document.getElementById(currentId).classList.add('active');
}

/**
 * 2. 🚀 INITIALIZE & DEEP LINKS
 */
async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || {IND:{}, US:{}};
    }

    const p = new URLSearchParams(window.location.search);
    const s = p.get('store'), c = p.get('cat');

    if (s && data[s]) {
        curStore = s; renderCats();
        navStack.push('catLayer');
        if (c && data[s][c]) {
            curCat = c; renderProds();
            navStack.push('pLayer');
        }
    }
    updateUI();
}

/**
 * 3. 🏬 RENDERERS
 */
function renderCats() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore === "IND" ? "India Store" : "US Store";
    Object.keys(data[curStore] || {}).forEach(c => {
        const img = (data.META[curStore] && data.META[curStore][c]?.img) || (data[curStore][c][0]?.img);
        g.innerHTML += `<div class="card" onclick="openCat('${c}')"><img src="${getImg(img)}"><div class="info"><b>${c}</b></div></div>`;
    });
}

function openCat(c) {
    curCat = c;
    renderProds();
    navTo('pLayer');
}

function renderProds() {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    if(!data[curStore][curCat]) return;
    data[curStore][curCat].forEach(p => {
        g.innerHTML += `<div class="card"><img src="${getImg(p.img)}" onclick="window.open('${p.link}')"><div class="info"><b>${p.name}</b><br><span style="color:var(--secondary);font-weight:800">${p.price}</span></div><a class="buy-btn" href="${p.link}">Buy Now</a></div>`;
    });
}

/**
 * 4. ⚙️ ADMIN TRIGGER (3-Click on Store Card)
 */
function hStore(s) {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
        if(clickCount >= 3) {
            if(prompt("PIN:") === "1234") document.getElementById('adminPanel').style.display='flex';
        } else {
            navTo('catLayer', s);
        }
        clickCount = 0;
    }, 300);
}
// Update the HTML calls to use hStore instead of navTo for the Admin trigger
document.querySelectorAll('.storeCard')[0].setAttribute('onclick', "hStore('IND')");
document.querySelectorAll('.storeCard')[1].setAttribute('onclick', "hStore('US')");

/**
 * 5. UTILS
 */
function getImg(u) { return u ? `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=400` : "https://via.placeholder.com/300"; }
function closeAdmin() { document.getElementById('adminPanel').style.display='none'; }
function copyForGithub() {
    const el = document.createElement('textarea'); el.value = JSON.stringify(data, null, 2);
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el); alert("Copied! Update your GitHub file.");
}

window.onload = init;
</script>
</body>
</html>
