<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pro Store Sync</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= STORE PAGE ================= -->
<div id="storePage" class="page">

<h2>India Store</h2>

<div class="grid">

<div class="card" onclick="openCategory('IND','Tech')">
<img src="https://via.placeholder.com/200">
<p>Tech</p>
</div>

<div class="card" onclick="openCategory('IND','Home')">
<img src="https://via.placeholder.com/200">
<p>Home</p>
</div>

<div class="card" onclick="openCategory('IND','Fashion')">
<img src="https://via.placeholder.com/200">
<p>Fashion</p>
</div>

</div>
</div>



<!-- ================= CATEGORY PAGE ================= -->
<div id="categoryPage" class="page" style="display:none">

<button class="backBtn" onclick="goStore()">← Back</button>

<h2 id="categoryTitle"></h2>

<div class="grid">

<div class="card"
onclick="openProduct('IND','Tech','p1')">
<img src="https://via.placeholder.com/200">
<p>Headphones</p>
</div>

</div>
</div>



<!-- ================= PRODUCT PAGE ================= -->
<div id="productPage" class="page" style="display:none">

<button class="backBtn" onclick="goCategory()">← Back</button>

<h2>Product Page</h2>

<img src="https://via.placeholder.com/300">

<br><br>

<button onclick="saveData()">Save</button>

<p id="saveStatus"></p>

</div>


<script src="script.js"></script>

</body>
</html>
