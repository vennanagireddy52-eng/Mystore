<style>

/* ---------- GLOBAL ---------- */

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

.hidden{display:none}

/* ---------- LAYER 1 : STORES ---------- */

#stores{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:40px;
background:linear-gradient(135deg,#ff7a18,#ffb347);
color:white;
}

.store-btn{
width:80%;
max-width:300px;
padding:25px;
text-align:center;
font-size:22px;
border-radius:15px;
background:white;
color:#333;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
cursor:pointer;
}

/* ---------- HEADER ---------- */

.header{
position:sticky;
top:0;
background:white;
padding:12px;
display:flex;
align-items:center;
gap:10px;
z-index:1000;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.back{
font-size:20px;
cursor:pointer;
font-weight:bold;
}

/* ---------- GRID (Pinterest Style) ---------- */

.grid{
column-count:2;
column-gap:0;
}

.card{
break-inside:avoid;
background:white;
margin:0;
padding:0;
}

.card img{
width:100%;
display:block;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
font-size:15px;
}

.desc{
font-size:12px;
color:#555;
margin:6px 0;
}

.price{
color:#ff5722;
font-weight:bold;
}

.rating{
font-size:13px;
}

.buy{
display:block;
margin-top:8px;
background:#111;
color:white;
text-align:center;
padding:8px;
border-radius:6px;
text-decoration:none;
}

</style>
</head>
