<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2 id="pageTitle">Categories</h2>
</header>

<div id="categoryPage" class="grid"></div>
<div id="productPage" class="grid" style="display:none;"></div>

<button id="adminBtn" onclick="openAdmin()">ADMIN</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h3>Category</h3>

<select id="categorySelect"></select>
<input id="newCategory" placeholder="New Category Name">
<input id="categoryImage" placeholder="Category Image URL">

<button onclick="addCategory()">Add Category</button>
<button onclick="updateCategory()">Edit Category</button>
<button onclick="deleteCategory()">Delete Category</button>

<hr>

<h3>Product</h3>

<select id="productCategory"></select>
<input id="productName" placeholder="Product Name">
<input id="productPrice" placeholder="Price">
<input id="productImage" placeholder="Image URL">
<input id="productLink" placeholder="Affiliate Link">

<button onclick="addProduct()">Add Product</button>
<button onclick="updateProduct()">Edit Product</button>
<button onclick="deleteProduct()">Delete Product</button>

<br><br>
<button onclick="closeAdmin()">Close</button>

</div>

<script src="script.js"></script>
</body>
</html>
