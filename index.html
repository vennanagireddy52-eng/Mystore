<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Cloud Store Pro</title>
    <style>
        body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#f0f2f5; color: #1a1a1a; user-select: none; }
        .layer { display:none; position:absolute; top:0; left:0; width:100%; height:100%; overflow:auto; background:#f0f2f5; padding-bottom: 100px; }
        .active { display:block; }
        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#6C5CE7,#00B894); min-height: 100vh; }
        .storeCard { background:white; width:80%; max-width:300px; padding:40px 20px; margin:15px; text-align:center; border-radius:25px; font-size:22px; font-weight:800; box-shadow:0 10px 30px rgba(0,0,0,0.2); cursor:pointer; }
        .topbar { padding:15px; display:flex; gap:12px; align-items:center; position:sticky; top:0; z-index:100; color:white; background:#6C5CE7; }
        .grid { column-count:2; column-gap:10px; padding:10px; }
        .card { break-inside: avoid; background:white; margin-bottom:12px; border-radius:15px; overflow:hidden; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.05); cursor:pointer; }
        .card img { width:100%; display:block; object-fit: contain; max-height: 200px; background: #fff; }
        .info { padding:10px; }
        .price { font-weight: 800; color: #00b894; }
        .link-symbol { position:absolute; top:8px; right:8px; background:white; border: none; border-radius: 50%; width: 34px; height: 34px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; font-size: 14px; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; border-radius: 0 0 15px 15px; }
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 90%; background: white; z-index: 2000; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 50px rgba(0,0,0,0.4); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #adminPanel.active { display: flex; }
        .admin-section { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        input, textarea, select, .btn-main { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: #6C5CE7; color: white; border: none; font-weight: bold; cursor: pointer; }
        #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:black; color:white; padding:10px 20px; border-radius:20px; display:none; z-index:3000; }
    </style>
</head>
<body>

<div id="toast">Link Copied!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
        <h2>Store Admin</h2>
        <button onclick="closeAdmin()" style="border:none; background:#eee; width:40px; height:40px; border-radius:50%;">✕</button>
    </div>
    <div class="admin-section" style="border: 2px solid orange;">
        <button class="btn-main" onclick="copyForGithub()" style="background:orange;">📋 STEP 2: COPY FOR GITHUB</button>
        <p style="font-size:11px; margin-top:5px;">After clicking, paste into your GitHub <b>store-data.json</b></p>
    </div>
    <div class="admin-section">
        <h3>Categories</h3>
        <select id="manageStore" onchange="syncUI()"><option value="IND">India</option><option value="US">US</option></select>
        <select id="editCatSelect" onchange="loadCat()"><option value="">-- New Category --</option></select>
        <input type="text" id="catInp" placeholder="Cat Name">
        <input type="text" id="catImgInp" placeholder="Cat Image URL">
        <button class="btn-main" onclick="saveCat()">Save Cat</button>
    </div>
    <div class="admin-section">
        <h3>Products</h3>
        <select id="pCatSel" onchange="syncPList()"><option value="">Select Category</option></select>
        <select id="editPSel" onchange="loadP()"><option value="">-- New Product --</option></select>
        <input type="text" id="pName" placeholder="Name"><textarea id="pDesc" placeholder="Desc"></textarea>
        <input type="text" id="pPrice" placeholder="Price"><input type="text" id="pImg" placeholder="Img URL">
        <input type="text" id="pLink" placeholder="Link">
        <button class="btn-main" onclick="saveP()" style="background:#00B894;">Save Product</button>
    </div>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hSec('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hSec('US')">🇺🇸 US STORE</div>
</div>
<div id="catLayer" class="layer">
    <div class="topbar"><span onclick="goHome()" style="cursor:pointer; font-size:20px;">⬅</span><span id="stTitle">Store</span></div>
    <div id="catGrid" class="grid"></div>
</div>
<div id="pLayer" class="layer">
    <div class="topbar"><span onclick="backC()" style="cursor:pointer; font-size:20px;">⬅</span><span id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
// --- CORE CONFIG ---
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{} };
let curStore = "", curCat = "", cc = 0;

function getImg(u) {
    if(!u) return "https://via.placeholder.com/150";
    return `https://images.weserv.nl/?url=${encodeURIComponent(u)}&default=https://via.placeholder.com/150`;
}

async function init() {
    try {
        // FORCE REFRESH: Added ?t=timestamp to bypass GitHub cache
        const res = await fetch(GITHUB_URL + "?t=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || { IND:{}, US:{} };
    }
    syncUI(); checkLink();
}

// --- ADMIN LOGIC ---
function syncUI() {
    const s = document.getElementById('manageStore').value;
    const cSel = document.getElementById('editCatSelect');
    const pCSel = document.getElementById('pCatSel');
    let h = '<option value="">-- Select --</option>';
    Object.keys(data[s]).forEach(c => h += `<option value="${c}">${c}</option>`);
    cSel.innerHTML = h; pCSel.innerHTML = h;
}
function syncPList() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value;
    const pSel = document.getElementById('editPSel');
    pSel.innerHTML = '<option value="">-- New --</option>';
    if(c) data[s][c].forEach(p => pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
}
function loadCat() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('editCatSelect').value;
    document.getElementById('catInp').value = c;
    document.getElementById('catImgInp').value = c ? (data[s][c]._img || "") : "";
}
function saveCat() {
    const s = document.getElementById('manageStore').value, old = document.getElementById('editCatSelect').value, n = document.getElementById('catInp').value.trim(), img = document.getElementById('catImgInp').value;
    if(!n) return;
    if(old && old!==n) { data[s][n]=data[s][old]; delete data[s][old]; }
    else if(!data[s][n]) data[s][n]=[];
    data[s][n]._img = img;
    saveLoc(); syncUI(); alert("Saved locally. Click Step 2 next.");
}
function loadP() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value, id = document.getElementById('editPSel').value;
    const p = data[s][c]?.find(x => x.id === id);
    ['pName','pDesc','pPrice','pImg','pLink'].forEach(k => document.getElementById(k).value = p ? p[k.substring(1).toLowerCase()] : "");
}
function saveP() {
    const s = document.getElementById('manageStore').value, c = document.getElementById('pCatSel').value, id = document.getElementById('editPSel').value;
    if(!c) return alert("Select Cat");
    let p = { id: id || "p"+Date.now(), name: document.getElementById('pName').value, desc: document.getElementById('pDesc').value, price: document.getElementById('pPrice').value, img: document.getElementById('pImg').value, link: document.getElementById('pLink').value };
    if(id) { const i = data[s][c].findIndex(x=>x.id===id); data[s][c][i]=p; } else data[s][c].push(p);
    saveLoc(); syncPList(); alert("Saved locally!");
}

// --- FRONTEND ---
function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    Object.keys(data[curStore]).forEach(c => {
        const l = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(c)}`;
        const img = data[curStore][c]._img || data[curStore][c][0]?.img;
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><button class="link-symbol" onclick="cp('${l}',event)">🔗</button><img src="${getImg(img)}"><div class="info"><b>${c}</b></div></div>`;
    });
}
function renP(hId=null) {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    data[curStore][curCat].forEach(p => {
        const l = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(curCat)}&prod=${p.id}`;
        g.innerHTML += `<div class="card" id="${p.id}"><button class="link-symbol" onclick="cp('${l}',event)">🔗</button><img src="${getImg(p.img)}"><div class="info"><b>${p.name}</b><p style="font-size:11px;color:#666">${p.desc}</p><div class="price">${p.price}</div></div><a class="buy-btn" href="${p.link}" target="_blank">Buy Now</a></div>`;
    });
    if(hId) setTimeout(()=>document.getElementById(hId)?.scrollIntoView({behavior:'smooth',block:'center'}),500);
}

// --- UTILS ---
function saveLoc() { localStorage.setItem('storeData', JSON.stringify(data)); }
function copyForGithub() { navigator.clipboard.writeText(JSON.stringify(data,null,2)); alert("COPIED! Now paste into GitHub."); }
function hSec(s) { cc++; setTimeout(() => { if(cc>=3) { if(prompt("Pass")==="1234") document.getElementById('adminPanel').classList.add('active'); } else if(cc===1) { curStore=s; renC(); show('catLayer'); } cc=0; }, 400); }
function openC(c) { curCat=c; renP(); show('pLayer'); }
function cp(t,e) { e.stopPropagation(); navigator.clipboard.writeText(t); const ts=document.getElementById('toast'); ts.style.display='block'; setTimeout(()=>ts.style.display='none',2000); }
function show(id) { document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome() { show('storeLayer'); }
function backC() { show('catLayer'); }
function closeAdmin() { document.getElementById('adminPanel').classList.remove('active'); }
function checkLink() { const p=new URLSearchParams(location.search), s=p.get('store'), c=p.get('cat'), id=p.get('prod'); if(s && data[s]){ curStore=s; if(c && data[s][c]){ curCat=c; renP(id); show('pLayer'); } else { renC(); show('catLayer'); } } }
window.onload = init;
</script>
</body>
</html>
