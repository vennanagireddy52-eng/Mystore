<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Pro Store Sync</title>
    <style>
        body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#f4f7f6; color: #1a1a1a; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; overflow-y:auto; background:#f4f7f6; padding-bottom: 80px; }
        .active { display:block; }
        
        /* LAYERS */
        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#6C5CE7,#00B894); height: 100vh; }
        .storeCard { background:white; width:85%; max-width:320px; padding:50px 20px; margin:15px; text-align:center; border-radius:25px; font-size:24px; font-weight:900; box-shadow:0 15px 35px rgba(0,0,0,0.2); cursor:pointer; }
        .topbar { padding:15px; display:flex; gap:12px; align-items:center; position:sticky; top:0; z-index:100; color:white; background:#6C5CE7; }
        .top-title { font-weight: bold; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* GRID */
        .grid { column-count:2; column-gap:12px; padding:12px; }
        .card { break-inside: avoid; background:white; margin-bottom:15px; border-radius:18px; overflow:hidden; position:relative; box-shadow:0 5px 15px rgba(0,0,0,0.06); cursor:pointer; }
        .card img { width:100%; display:block; object-fit: contain; min-height: 140px; background: #fff; }
        .info { padding:12px; }
        .price { font-weight: 800; color: #00b894; font-size: 16px; margin-top: 5px; display: block; }
        
        /* UI ELEMENTS */
        .link-symbol { position:absolute; top:10px; right:10px; background:white; border: none; border-radius: 50%; width: 34px; height: 34px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 10; display: flex; align-items: center; justify-content: center; color: #6C5CE7; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:12px; text-decoration:none; font-weight:bold; border-radius: 0 0 18px 18px; font-size: 14px; }
        #toast { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:white; padding:10px 25px; border-radius:30px; display:none; z-index:3000; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast">Link Copied!</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hSec('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hSec('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><span onclick="window.history.back()" style="cursor:pointer; font-size:24px; padding:0 10px;">⬅</span><span class="top-title" id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><span onclick="window.history.back()" style="cursor:pointer; font-size:24px; padding:0 10px;">⬅</span><span class="top-title" id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "";

// --- 🛡️ THE NAVIGATION ENGINE ---
function showLayer(id, push = true) {
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    const target = document.getElementById(id);
    if(target) target.classList.add('active');
    if (push) window.history.pushState({ layer: id }, "");
}

// Mobile Hardware Back Button Handler
window.onpopstate = function(e) {
    const layerId = (e.state && e.state.layer) ? e.state.layer : 'storeLayer';
    showLayer(layerId, false);
};

// --- 🚀 THE 3-CLICK HISTORY INJECTOR ---
async function init() {
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('storeData')) || { IND:{}, US:{} };
    }

    const params = new URLSearchParams(window.location.search);
    const s = params.get('store'), c = params.get('cat'), pid = params.get('prod');

    // STEP 1: Fix the very first history entry as the Store Layer
    window.history.replaceState({ layer: 'storeLayer' }, "");

    if (s && data[s]) {
        curStore = s; renC();
        
        if (c && data[s][c]) {
            curCat = c; renP(pid);
            
            // STEP 2: Manually push Category layer into the stack
            window.history.pushState({ layer: 'catLayer' }, "");
            
            // STEP 3: Manually push Product layer into the stack
            window.history.pushState({ layer: 'pLayer' }, "");
            
            // Show the Product layer (without pushing again)
            showLayer('pLayer', false);
        } else {
            // Only Category was linked
            window.history.pushState({ layer: 'catLayer' }, "");
            showLayer('catLayer', false);
        }
    } else {
        // No deep link, start at Store Selection
        showLayer('storeLayer', false);
    }
}

// --- RENDERERS ---
function hSec(s) { curStore = s; renC(); showLayer('catLayer'); }
function openC(c) { curCat = c; renP(); showLayer('pLayer'); }

function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    document.getElementById('stTitle').innerText = curStore === "IND" ? "India" : "US";
    Object.keys(data[curStore]).forEach(c => {
        const shareLink = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(c)}`;
        g.innerHTML += `
            <div class="card" onclick="openC('${c}')">
                <button class="link-symbol" onclick="cp('${shareLink}',event)">🔗</button>
                <img src="${(data.META && data.META[curStore][c]?.img) || data[curStore][c][0]?.img || ''}">
                <div class="info"><b>${c}</b></div>
            </div>`;
    });
}

function renP(scrollToId = null) {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    document.getElementById('ctTitle').innerText = curCat;
    (data[curStore][curCat] || []).forEach(p => {
        const shareLink = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(curCat)}&prod=${p.id}`;
        g.innerHTML += `
            <div class="card" id="${p.id}">
                <button class="link-symbol" onclick="cp('${shareLink}',event)">🔗</button>
                <img src="${p.img}">
                <div class="info"><b>${p.name}</b><span class="price">${p.price}</span></div>
                <a class="buy-btn" href="${p.link}" target="_blank">View Product</a>
            </div>`;
    });
    if(scrollToId) setTimeout(() => document.getElementById(scrollToId)?.scrollIntoView({behavior:'smooth', block:'center'}), 500);
}

function cp(t, e) {
    e.stopPropagation();
    navigator.clipboard.writeText(t);
    const ts = document.getElementById('toast');
    ts.style.display = 'block';
    setTimeout(() => ts.style.display = 'none', 2000);
}

window.onload = init;
</script>
</body>
</html>
