<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Affiliate Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f0f2f5}
.layer{display:none;min-height:100vh}
.active{display:block}

/* STORE */
#storeLayer{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:#fff;
padding:25px;
margin:15px;
border-radius:20px;
font-weight:bold;
cursor:pointer;
width:260px;
text-align:center;
}

/* TOPBAR */
.topbar{
padding:15px;
color:white;
display:flex;
align-items:center;
gap:10px;
position:sticky;
top:0;
}

.purple{background:#6C5CE7}
.green{background:#00B894}

.back{cursor:pointer;font-size:22px}

/* GRID */
.grid{
column-count:2;
column-gap:10px;
padding:15px;
}

.card{
background:white;
margin-bottom:12px;
border-radius:15px;
overflow:hidden;
position:relative;
break-inside:avoid;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card img{width:100%}

.info{padding:10px;font-weight:bold}

.buy{
display:block;
background:#00b894;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
}

/* SMALL LINK BUTTON */
.linkBtn{
position:absolute;
top:8px;
right:8px;
width:28px;
height:28px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,.3);
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:8px 20px;
border-radius:20px;
display:none;
}
</style>
</head>

<body>

<div id="toast">Link Copied 🔗</div>

<!-- STORE -->
<div id="storeLayer" class="layer active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY -->
<div id="categoryLayer" class="layer">
<div class="topbar purple">
<span class="back" onclick="goHome()">⬅</span>
<b>Categories</b>
</div>
<div id="categoryGrid" class="grid"></div>
</div>

<!-- PRODUCTS -->
<div id="productLayer" class="layer">
<div class="topbar green">
<span class="back" onclick="backToCategories()">⬅</span>
<b>Products</b>
</div>
<div id="productGrid" class="grid"></div>
</div>

<script>
/* ===== DATA (ADMIN CONTROLS HERE ONLY) ===== */
const data={
IND:{
Tech:[
{
name:"JBL Speaker",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
price:"₹2799",
link:"https://amzn.to/40OZeuH"
}
],
Travel:[
{
name:"Travel Bags",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
price:"₹799",
link:"https://amzn.to/47iPnky"
}
]
},
US:{
Tech:[
{
name:"JBL Speaker",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",
price:"$97",
link:"https://amzn.to/3PvtdW7"
}
]
}
};

let currentStore="";
let currentCategory="";

/* TOAST */
function toast(){
const t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* COPY LINK */
function copyLink(link,e){
if(e)e.stopPropagation();
navigator.clipboard.writeText(link);
toast();
}

/* NAVIGATION */
function openStore(store){
currentStore=store;
switchLayer("categoryLayer");
renderCategories();
}

function openCategory(cat){
currentCategory=cat;
switchLayer("productLayer");
renderProducts();
}

function goHome(){
switchLayer("storeLayer");
}

function backToCategories(){
switchLayer("categoryLayer");
}

/* LAYER SWITCH (FIXES STICKY ISSUE) */
function switchLayer(id){
document.querySelectorAll(".layer")
.forEach(l=>l.classList.remove("active"));
document.getElementById(id).classList.add("active");
window.scrollTo(0,0);
}

/* RENDER CATEGORY */
function renderCategories(){
const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{
const shareLink=`${location.href}?store=${currentStore}&cat=${cat}`;

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">

<button class="linkBtn"
onclick="copyLink('${shareLink}',event)">🔗</button>

<img src="${data[currentStore][cat][0].img}">
<div class="info">${cat}</div>

</div>`;
});
}

/* RENDER PRODUCTS */
function renderProducts(){
const grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{
grid.innerHTML+=`
<div class="card">

<button class="linkBtn"
onclick="copyLink('${p.link}',event)">🔗</button>

<img src="${p.img}">
<div class="info">${p.name}<br>${p.price}</div>

<a class="buy" href="${p.link}" target="_blank">Buy Now</a>

</div>`;
});
}
</script>

</body>
</html>
