<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Base Styles */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 16px;
    background-color: #fff;
  }

  /* Header / Back Button */
  .page-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: bold;
    font-style: italic;
  }
  .back-btn {
    cursor: pointer;
    font-size: 24px;
    margin-right: 15px;
    display: none; /* Hidden by default on categories page */
    background: none;
    border: none;
    padding: 0;
  }

  /* Grid Layout - The core of the 2-column design */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
    gap: 16px;
  }

  /* Responsive for desktop: 4 columns */
  @media (min-width: 768px) {
    .grid-container {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* Card Styling */
  .card {
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }

  .card-image-wrapper {
    background-color: #f8f8f8; /* Light gray background for product shots */
    border-radius: 12px;
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    aspect-ratio: 1 / 1; /* Keeps images perfectly square */
    margin-bottom: 8px;
  }

  .card img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* Text Styling to match your screenshot */
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px 0;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2; /* Truncates text after 2 lines */
    -webkit-box-orient: vertical;
    overflow: hidden;
