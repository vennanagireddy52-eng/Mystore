<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Affiliate Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f0f2f5}

/* ===== LAYERS (FIX STICKY STORE) ===== */
.layer{display:none;height:100vh}
.layer.active{display:block}

/* ===== STORE PAGE ===== */
#storeLayer{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:#fff;
padding:25px;
margin:15px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

/* ===== TOPBAR ===== */
.topbar{
background:#00b894;
color:#fff;
padding:15px;
display:flex;
gap:10px;
align-items:center;
}

.back{cursor:pointer;font-size:20px}

/* ===== GRID ===== */
.grid{column-count:2;padding:10px}
.card{
background:#fff;
margin:8px;
border-radius:12px;
overflow:hidden;
position:relative;
}

.card img{width:100%}

.info{padding:8px}
.price{color:#d63031;font-weight:bold}

/* ===== LINK BUTTON ===== */
.linkBtn{
position:absolute;
top:6px;
right:6px;
background:#fff;
border:none;
border-radius:50%;
cursor:pointer;
}

/* ===== ADMIN BUTTON ===== */
#adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:#fff;
border:none;
padding:12px 18px;
border-radius:25px;
z-index:9999;
cursor:pointer;
}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">⚙ Admin</button>

<!-- STORE -->
<div id="storeLayer" class="layer active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY -->
<div id="categoryLayer" class="layer">
<div class="topbar">
<span class="back" onclick="goHome()">⬅</span> Categories
</div>
<div id="categoryGrid" class="grid"></div>
</div>

<!-- PRODUCT -->
<div id="productLayer" class="layer">
<div class="topbar">
<span class="back" onclick="backCategory()">⬅</span> Products
</div>
<div id="productGrid" class="grid"></div>
</div>

<!-- ADMIN -->
<div id="adminLayer" class="layer">
<div class="topbar">
<span class="back" onclick="goHome()">⬅</span> Admin Panel
</div>

<div style="padding:15px">

<h3>Add Category</h3>
<input id="catName" placeholder="Category Name"><br><br>
<input id="catImg" placeholder="Image URL"><br><br>
<button onclick="addCategory()">Add</button>

<hr>

<h3>Add Product</h3>
<input id="prodCat" placeholder="Category"><br><br>
<input id="prodName" placeholder="Product Name"><br><br>
<input id="prodImg" placeholder="Image URL"><br><br>
<input id="prodPrice" placeholder="Price"><br><br>
<input id="prodLink" placeholder="Affiliate Link"><br><br>
<button onclick="addProduct()">Add</button>

</div>
</div>

<script>

/* ===== DATA ===== */
let data={
IND:{
Tech:[
{name:"JBL Speaker",img:"https://via.placeholder.com/300",price:"₹2799",link:"https://amazon.in"}
]
},
US:{}
};

let currentStore="";
let currentCategory="";

/* ===== PAGE SWITCH ===== */
function showLayer(id){
document.querySelectorAll('.layer')
.forEach(l=>l.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ===== STORE ===== */
function openStore(store){
currentStore=store;
renderCategories();
showLayer("categoryLayer");
}

function goHome(){
showLayer("storeLayer");
}

/* ===== CATEGORY ===== */
function renderCategories(){
let grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{
let link=location.origin+location.pathname+
`?store=${currentStore}&cat=${cat}`;

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<button class="linkBtn"
onclick="copyLink('${link}',event)">🔗</button>
<img src="${data[currentStore][cat][0]?.img}">
<div class="info">${cat}</div>
</div>`;
});
}

function openCategory(cat){
currentCategory=cat;
renderProducts();
showLayer("productLayer");
}

function backCategory(){
showLayer("categoryLayer");
}

/* ===== PRODUCTS ===== */
function renderProducts(){
let grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach((p,i)=>{

grid.innerHTML+=`
<div class="card">
<button class="linkBtn"
onclick="copyLink('${p.link}',event)">🔗</button>

<img src="${p.img}">
<div class="info">
${p.name}<br>
<span class="price">${p.price}</span><br>

<a href="${p.link}" target="_blank">Buy</a><br><br>

<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>
</div>
</div>`;
});
}

/* ===== ADMIN ===== */
function openAdmin(){
showLayer("adminLayer");
}

function addCategory(){
let name=document.getElementById("catName").value;
let img=document.getElementById("catImg").value;

if(!data[currentStore])data[currentStore]={};
data[currentStore][name]=[
{name:name,img:img,price:"",link:""}
];

renderCategories();
alert("Category Added");
}

function addProduct(){
let cat=document.getElementById("prodCat").value;

data[currentStore][cat].push({
name:prodName.value,
img:prodImg.value,
price:prodPrice.value,
link:prodLink.value
});

alert("Product Added");
}

function editProduct(i){
let p=data[currentStore][currentCategory][i];
p.name=prompt("Edit name",p.name);
p.price=prompt("Edit price",p.price);
renderProducts();
}

function deleteProduct(i){
data[currentStore][currentCategory].splice(i,1);
renderProducts();
}

/* ===== COPY LINK ===== */
function copyLink(link,e){
e.stopPropagation();
navigator.clipboard.writeText(link);
alert("Link Copied ✅");
}

</script>
</body>
</html>
