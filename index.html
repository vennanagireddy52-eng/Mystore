<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Affiliate Store</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f0f2f5;
}

.layer{
display:none;
min-height:100vh;
}

.layer.active{
display:flex;
flex-direction:column;
}

/* ---------- STORE PAGE ---------- */
#storeLayer{
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:white;
width:80%;
max-width:300px;
padding:25px;
margin:15px;
text-align:center;
border-radius:20px;
font-size:20px;
font-weight:bold;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
cursor:pointer;
}

/* ---------- TOP BAR ---------- */
.topbar{
padding:15px;
display:flex;
gap:10px;
align-items:center;
position:sticky;
top:0;
z-index:100;
color:white;
}

.back{
font-size:24px;
cursor:pointer;
}

.search{
flex:1;
padding:10px 15px;
border-radius:25px;
border:none;
outline:none;
}

/* ---------- GRID ---------- */
.grid{
column-count:2;
column-gap:10px;
padding:15px;
}

.card{
break-inside:avoid;
background:white;
margin-bottom:12px;
border-radius:15px;
overflow:hidden;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card img{
width:100%;
display:block;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
font-size:14px;
}

.price{
color:#d63031;
font-weight:bold;
margin-top:5px;
font-size:13px;
}

/* ---------- BUTTONS ---------- */
.buy{
display:block;
background:#00b894;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
font-size:13px;
font-weight:bold;
}

.share-btn{
position:absolute;
top:8px;
right:8px;
background:white;
border:none;
border-radius:50%;
width:30px;
height:30px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:8px 20px;
border-radius:20px;
display:none;
z-index:1000;
font-size:13px;
}

</style>
</head>

<body>

<div id="toast">Link Copied 🔗</div>

<!-- STORE -->
<div id="storeLayer" class="layer active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- CATEGORY -->
<div id="categoryLayer" class="layer">
<div class="topbar" style="background:#6C5CE7;">
<span class="back" onclick="goHome()">⬅</span>
<input class="search" placeholder="Search category">
</div>

<div id="categoryGrid" class="grid"></div>
</div>

<!-- PRODUCT -->
<div id="productLayer" class="layer">
<div class="topbar" style="background:#00B894;">
<span class="back" onclick="backToCategories()">⬅</span>
<input class="search" placeholder="Search product">
</div>

<div id="productGrid" class="grid"></div>
</div>

<script>

/* ---------- DATA ---------- */
const data={
IND:{
Tech:[
{name:"JBL Speaker",img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",price:"₹2799",link:"https://amzn.to/40OZeuH"}
]
},
US:{
Tech:[
{name:"JBL Speaker",img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",price:"$97",link:"https://amzn.to/3PvtdW7"}
]
}
};

let currentStore="";
let currentCategory="";

/* ---------- NAVIGATION ---------- */
function showLayer(id){
document.querySelectorAll(".layer").forEach(l=>l.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openStore(store){
currentStore=store;
renderCategories();
showLayer("categoryLayer");
}

function openCategory(cat){
currentCategory=cat;
renderProducts();
showLayer("productLayer");
}

function goHome(){
showLayer("storeLayer");
}

function backToCategories(){
showLayer("categoryLayer");
}

/* ---------- RENDER ---------- */
function renderCategories(){
const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{
grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<button class="share-btn" onclick="copyLink(event)">🔗</button>
<img src="${data[currentStore][cat][0].img}">
<div class="info"><div class="title">${cat}</div></div>
</div>`;
});
}

function renderProducts(){
const grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{
grid.innerHTML+=`
<div class="card">
<button class="share-btn" onclick="copyLink(event,'${p.link}')">🔗</button>
<img src="${p.img}">
<div class="info">
<div class="title">${p.name}</div>
<div class="price">${p.price}</div>
</div>
<a class="buy" href="${p.link}" target="_blank">Buy Now</a>
</div>`;
});
}

/* ---------- LINK COPY ---------- */
function copyLink(e,link){
e.stopPropagation();
navigator.clipboard.writeText(link || window.location.href);
const t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

</script>

</body>
</html>
