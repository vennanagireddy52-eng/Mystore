<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cloud Store</title>
    <style>
        /* --- ALL PREVIOUS STYLES REMAIN SAME --- */
        body { margin:0; font-family:'Segoe UI', sans-serif; background:#f0f2f5; color: #2d3436; scroll-behavior: smooth; user-select: none; }
        .layer { display:none; position:absolute; top:0; left:0; width:100%; height:100%; overflow:auto; background:#f0f2f5; padding-bottom: 100px; }
        .active { display:block; }
        #storeLayer { display:flex; flex-direction:column; justify-content:center; align-items:center; background:linear-gradient(135deg,#6C5CE7,#00B894); min-height: 100vh; }
        .storeCard { background:white; width:80%; max-width:300px; padding:25px; margin:15px; text-align:center; border-radius:20px; font-size:20px; font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.2); cursor:pointer; }
        .topbar { padding:15px; display:flex; gap:10px; align-items:center; position:sticky; top:0; z-index:100; color:white; background:#6C5CE7; }
        .grid { column-count:2; column-gap:10px; padding:15px; }
        .card { break-inside: avoid; background:white; margin-bottom:12px; border-radius:15px; overflow:hidden; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.05); cursor:pointer; }
        .card img { width:100%; display:block; background: #eee; min-height: 100px; object-fit: cover; }
        .info { padding:10px; }
        .title { font-weight:bold; font-size:14px; }
        .desc { font-size: 11px; color: #636e72; margin-bottom: 8px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price { font-weight: bold; color: #00b894; font-size: 13px; }
        .link-symbol { position:absolute; top:8px; right:8px; background:white; color: #6C5CE7; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 15; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:10px; text-decoration:none; font-size:12px; font-weight:bold; }

        /* --- ADMIN UPDATES --- */
        #adminPanel { position: fixed; bottom: 0; left: 0; width: 100%; height: 95%; background: white; z-index: 2000; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #adminPanel.active { display: flex; }
        .admin-section { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        input, textarea, select, .btn-main { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: #6C5CE7; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-del { background: #ff7675 !important; }
        .btn-edit { background: #00cec9 !important; color: #2d3436 !important; }
        #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); color:white; padding:10px 20px; border-radius:30px; display:none; z-index:3000; font-size:12px; }
    </style>
</head>
<body>

<div id="toast">Link Copied!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
        <h2 style="margin:0">Advanced Admin</h2>
        <button onclick="closeAdmin()" style="background:#eee; border-radius:50%; border:none; width:35px; height:35px;">✕</button>
    </div>

    <div class="admin-section" style="border: 2px solid #ff9f43;">
        <button class="btn-main" onclick="copyForGithub()" style="background:#ff9f43;">📋 1. CLICK TO SAVE CHANGES TO GITHUB</button>
    </div>

    <div class="admin-section">
        <h3>📂 Category Manager</h3>
        <select id="manageStore" onchange="syncAdminDropdowns()"><option value="IND">🇮🇳 India Store</option><option value="US">🇺🇸 US Store</option></select>
        <select id="editCatSelect" onchange="loadCatToEdit()"><option value="">-- Edit Existing Category --</option></select>
        <input type="text" id="catNameInp" placeholder="Category Name">
        <input type="text" id="catImgInp" placeholder="Category Image URL (from first product)">
        <div style="display:flex; gap:5px;">
            <button class="btn-main" onclick="saveCategory()">Update/Add Category</button>
            <button class="btn-main btn-del" onclick="deleteCategory()">Delete Cat</button>
        </div>
    </div>

    <div class="admin-section">
        <h3>🛍️ Product Manager</h3>
        <select id="prodCatSelect" onchange="syncProductList()"><option value="">Select Category</option></select>
        <select id="editProdSelect" onchange="loadProdToEdit()"><option value="">-- Edit Existing Product --</option></select>
        <hr>
        <input type="text" id="pName" placeholder="Product Name">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <input type="text" id="pPrice" placeholder="Price">
        <input type="text" id="pImg" placeholder="Image URL">
        <input type="text" id="pLink" placeholder="Affiliate Link">
        <select id="moveToCat" style="background:#e1f5fe;"><option value="">Keep in same category</option></select>
        
        <div style="display:flex; gap:5px;">
            <button class="btn-main" onclick="saveProduct()">Update/Add Product</button>
            <button class="btn-main btn-del" onclick="deleteProduct()">Delete Product</button>
        </div>
    </div>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="handleSecretClick('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="handleSecretClick('US')">🇺🇸 US STORE</div>
</div>
<div id="categoryLayer" class="layer"><div class="topbar"><span onclick="goHome()">⬅</span></div><div id="categoryGrid" class="grid"></div></div>
<div id="productLayer" class="layer"><div class="topbar"><span onclick="backToCategories()">⬅</span></div><div id="productGrid" class="grid"></div></div>

<script>
const GITHUB_RAW_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
const ADMIN_PASS = "1234";

let data = { IND:{}, US:{} };
let curStore = "";
let curCat = "";
let clickCount = 0;

async function init() {
    try {
        const res = await fetch(GITHUB_RAW_URL);
        data = await res.json();
    } catch (e) {
        data = JSON.parse(localStorage.getItem('smartStoreData')) || { IND:{}, US:{} };
    }
    syncAdminDropdowns();
    checkLinks();
}

// --- SYNC ADMIN UI ---
function syncAdminDropdowns() {
    const s = document.getElementById('manageStore').value;
    const catEdit = document.getElementById('editCatSelect');
    const prodCat = document.getElementById('prodCatSelect');
    const moveCat = document.getElementById('moveToCat');

    let options = '<option value="">-- Select Category --</option>';
    if(data[s]) {
        Object.keys(data[s]).forEach(c => options += `<option value="${c}">${c}</option>`);
    }
    catEdit.innerHTML = options;
    prodCat.innerHTML = options;
    moveCat.innerHTML = options;
}

function syncProductList() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('prodCatSelect').value;
    const pSel = document.getElementById('editProdSelect');
    pSel.innerHTML = '<option value="">-- New Product --</option>';
    if(c && data[s][c]) {
        data[s][c].forEach(p => pSel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
    }
}

// --- CATEGORY ACTIONS ---
function loadCatToEdit() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('editCatSelect').value;
    if(!c) return;
    document.getElementById('catNameInp').value = c;
    document.getElementById('catImgInp').value = data[s][c][0]?.img || "";
}

function saveCategory() {
    const s = document.getElementById('manageStore').value;
    const oldName = document.getElementById('editCatSelect').value;
    const newName = document.getElementById('catNameInp').value;
    if(!newName) return;

    if(oldName && oldName !== newName) {
        data[s][newName] = data[s][oldName];
        delete data[s][oldName];
    } else if(!data[s][newName]) {
        data[s][newName] = [];
    }
    alert("Category Updated Locally!");
    saveLocal(); syncAdminDropdowns();
}

function deleteCategory() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('editCatSelect').value;
    if(c && confirm(`Delete entire category "${c}"?`)) {
        delete data[s][c];
        saveLocal(); syncAdminDropdowns();
    }
}

// --- PRODUCT ACTIONS ---
function loadProdToEdit() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('prodCatSelect').value;
    const id = document.getElementById('editProdSelect').value;
    const p = data[s][c].find(i => i.id === id);
    if(!p) return;
    document.getElementById('pName').value = p.name;
    document.getElementById('pDesc').value = p.desc;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pImg').value = p.img;
    document.getElementById('pLink').value = p.link;
}

function saveProduct() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('prodCatSelect').value;
    const targetC = document.getElementById('moveToCat').value || c;
    const id = document.getElementById('editProdSelect').value;
    
    let pObj = {
        id: id || "p" + Date.now(),
        name: document.getElementById('pName').value,
        desc: document.getElementById('pDesc').value,
        price: document.getElementById('pPrice').value,
        img: document.getElementById('pImg').value,
        link: document.getElementById('pLink').value
    };

    if(id) {
        // Edit existing
        const idx = data[s][c].findIndex(i => i.id === id);
        if(c !== targetC) {
            data[s][c].splice(idx, 1);
            data[s][targetC].push(pObj);
        } else {
            data[s][c][idx] = pObj;
        }
    } else {
        // New
        data[s][targetC].push(pObj);
    }
    saveLocal(); syncProductList(); alert("Product Saved Locally!");
}

function deleteProduct() {
    const s = document.getElementById('manageStore').value;
    const c = document.getElementById('prodCatSelect').value;
    const id = document.getElementById('editProdSelect').value;
    if(id && confirm("Delete product?")) {
        data[s][c] = data[s][c].filter(i => i.id !== id);
        saveLocal(); syncProductList();
    }
}

// --- CORE UTILS ---
function saveLocal() { localStorage.setItem('smartStoreData', JSON.stringify(data)); }
function copyForGithub() { navigator.clipboard.writeText(JSON.stringify(data, null, 4)); alert("Data Copied! Paste into GitHub now."); }
function handleSecretClick(s) { clickCount++; setTimeout(() => { if(clickCount>=3){ if(prompt("Pass:")===ADMIN_PASS) document.getElementById('adminPanel').classList.add('active'); } else if(clickCount===1) openStore(s); clickCount=0; }, 400); }
function openStore(s){ curStore=s; renderCats(); show('categoryLayer'); }
function renderCats(){ const g=document.getElementById('categoryGrid'); g.innerHTML=""; Object.keys(data[curStore]).forEach(c=>{ const l=`${window.location.origin}${window.location.pathname}?store=${curStore}&cat=${c}`; g.innerHTML+=`<div class="card" onclick="openCat('${c}')"><button class="link-symbol" onclick="copyT('${l}',event)">🔗</button><img src="${data[curStore][c][0]?.img}"><div class="info"><b>${c}</b></div></div>`; }); }
function openCat(c){ curCat=c; renderProds(); show('productLayer'); }
function renderProds(){ const g=document.getElementById('productGrid'); g.innerHTML=""; data[curStore][curCat].forEach(p=>{ const l=`${window.location.origin}${window.location.pathname}?store=${curStore}&cat=${curCat}&prod=${p.id}`; g.innerHTML+=`<div class="card" id="${p.id}"><button class="link-symbol" onclick="copyT('${l}',event)">🔗</button><img src="${p.img}"><div class="info"><b>${p.name}</b><p class="desc">${p.desc}</p><div class="price">${p.price}</div></div><a class="buy-btn" href="${p.link}" target="_blank">Buy Now</a></div>`; }); }
function copyT(t,e){ e.stopPropagation(); navigator.clipboard.writeText(t); document.getElementById('toast').style.display='block'; setTimeout(()=>document.getElementById('toast').style.display='none',2000); }
function show(id){ document.querySelectorAll('.layer').forEach(l=>l.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ show('storeLayer'); }
function backToCategories(){ show('categoryLayer'); }
function closeAdmin(){ document.getElementById('adminPanel').classList.remove('active'); }
function checkLinks(){ const p=new URLSearchParams(window.location.search); const s=p.get('store'); if(s && data[s]){ curStore=s; const c=p.get('cat'); if(c && data[s][c]){ curCat=c; renderProds(); show('productLayer'); } else { renderCats(); show('categoryLayer'); } } }
window.onload = init;
</script>
</body>
</html>
