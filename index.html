<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Store</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<button id="backBtn" onclick="goBack()">←</button>
<h2 id="pageTitle">Stores</h2>
</header>

<div id="storePage" class="page"></div>
<div id="categoryPage" class="page hidden"></div>
<div id="productPage" class="page hidden"></div>

<button id="adminBtn" onclick="toggleAdmin()">ADMIN</button>

<div id="adminPanel" class="hidden admin">
<h3>Admin Panel</h3>

<h4>Add Category</h4>
<input id="catName" placeholder="Category Name">
<input id="catImg" placeholder="Category Image URL">
<button onclick="addCategory()">Add Category</button>

<h4>Add Product</h4>
<input id="prodName" placeholder="Product Name">
<input id="prodPrice" placeholder="Price">
<input id="prodImg" placeholder="Image URL">
<input id="prodLink" placeholder="Affiliate Link">
<button onclick="addProduct()">Add Product</button>

</div>

<script src="script.js"></script>
</body>
</html>
