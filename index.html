<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Affiliate Store</title>

<style>

/* ---------- BODY ---------- */
body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f3f3;
}

/* ---------- LAYERS ---------- */
.layer{
display:none;
min-height:100vh;
}

.active{
display:block;
}

/* ---------- STORE PAGE ---------- */

#storeLayer{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

.store{
font-size:26px;
padding:25px 40px;
margin:40px;
border-radius:12px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
}

/* ---------- TOP BAR ---------- */

.topbar{
display:flex;
align-items:center;
gap:10px;
background:white;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.back{
font-size:22px;
cursor:pointer;
}

/* ---------- SEARCH ---------- */

.search{
width:100%;
padding:10px;
border:none;
outline:none;
background:#eee;
border-radius:8px;
}

/* ---------- GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:0;
}

.card{
background:white;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.title{
font-weight:bold;
padding:5px;
}

.desc{
font-size:12px;
padding:0 5px 8px;
color:#555;
}

.price{
color:#e91e63;
font-weight:bold;
padding:0 5px;
}

.rating{
padding:0 5px;
font-size:13px;
}

.buy{
display:block;
text-align:center;
background:#ff416c;
color:white;
padding:10px;
text-decoration:none;
margin-top:5px;
}

</style>
</head>

<body>

<!-- ================= STORE LAYER ================= -->
<div id="storeLayer" class="layer active">

<div class="store" onclick="openStore('IND')">
IND STORE 🇮🇳
</div>

<div class="store" onclick="openStore('US')">
US STORE 🇺🇸
</div>

</div>


<!-- ================= CATEGORY LAYER ================= -->
<div id="categoryLayer" class="layer">

<div class="topbar">
<span class="back" onclick="goHome()">⬅</span>
<input class="search" id="categorySearch"
placeholder="Search category..."
onkeyup="searchCategory()">
</div>

<div id="categoryGrid" class="grid"></div>

</div>


<!-- ================= PRODUCT LAYER ================= -->
<div id="productLayer" class="layer">

<div class="topbar">
<span class="back" onclick="backToCategory()">⬅</span>
<input class="search" id="productSearch"
placeholder="Search product..."
onkeyup="searchProduct()">
</div>

<div id="productGrid" class="grid"></div>

</div>


<script>

/* ---------- DATA ---------- */

const categories = [
{
name:"TECH",
img:"https://m.media-amazon.com/images/I/61LtuGzXeaL._SL1500_.jpg",
desc:"Smart gadgets improving productivity and entertainment everyday."
},
{
name:"KITCHEN",
img:"https://m.media-amazon.com/images/I/61L1ItFgFHL._SL1500_.jpg",
desc:"Essential kitchen tools for faster cooking and convenience."
},
{
name:"FASHION",
img:"https://m.media-amazon.com/images/I/61B0+qQriPL._UL1500_.jpg",
desc:"Trending fashion styles designed for comfort and daily wear."
},
{
name:"TRAVEL",
img:"https://m.media-amazon.com/images/I/71QKQ9mwV7L._SL1500_.jpg",
desc:"Travel accessories making journeys organized easy and safe."
}
];

const products = {
FASHION:[
{
title:"H1 Hoodie",
img:"https://m.media-amazon.com/images/I/61B0+qQriPL._UL1500_.jpg",
desc:"Comfortable cotton hoodie designed for everyday wear offering breathable fabric modern fit durable stitching stylish design suitable for casual outings travel daily use and long lasting comfort experience.",
price:"₹899",
rating:"4.3⭐",
link:"https://amzn.to/"
},
{
title:"H2 Hoodie",
img:"https://m.media-amazon.com/images/I/61B0+qQriPL._UL1500_.jpg",
desc:"Premium hoodie featuring soft fabric comfortable design perfect for winter casual style lightweight warmth stylish appearance daily wear friendly and easy maintenance long lasting material quality.",
price:"₹999",
rating:"4.4⭐",
link:"https://amzn.to/"
}
]
};

/* ---------- NAVIGATION ---------- */

let currentCategory="";

function openStore(){
document.getElementById("storeLayer").classList.remove("active");
document.getElementById("categoryLayer").classList.add("active");
loadCategories();
}

function goHome(){
document.getElementById("categoryLayer").classList.remove("active");
document.getElementById("productLayer").classList.remove("active");
document.getElementById("storeLayer").classList.add("active");
}

function backToCategory(){
document.getElementById("productLayer").classList.remove("active");
document.getElementById("categoryLayer").classList.add("active");
}

/* ---------- CATEGORY LOAD ---------- */

function loadCategories(){
const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

categories.forEach(cat=>{
grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat.name}')">
<img src="${cat.img}">
<div class="title">${cat.name}</div>
<div class="desc">${cat.desc}</div>
</div>`;
});
}

/* ---------- OPEN CATEGORY ---------- */

function openCategory(name){
currentCategory=name;
document.getElementById("categoryLayer").classList.remove("active");
document.getElementById("productLayer").classList.add("active");
loadProducts();
}

/* ---------- PRODUCT LOAD ---------- */

function loadProducts(){
const grid=document.getElementById("productGrid");
grid.innerHTML="";

(products[currentCategory]||[]).forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="title">${p.title}</div>
<div class="desc">${p.desc}</div>
<div class="price">${p.price}</div>
<div class="rating">${p.rating}</div>
<a class="buy" href="${p.link}" target="_blank">Buy Now</a>
</div>`;
});
}

/* ---------- SEARCH ---------- */

function searchCategory(){
let v=document.getElementById("categorySearch").value.toLowerCase();
document.querySelectorAll("#categoryGrid .card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

function searchProduct(){
let v=document.getElementById("productSearch").value.toLowerCase();
document.querySelectorAll("#productGrid .card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

</script>

</body>
</html>
