<style>

/* ---------- GENERAL ---------- */

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#6C5CE7,#00B894);
color:#222;
overflow-x:hidden;
}

.hidden{display:none}

/* ---------- LAYER 1 : STORES ---------- */

#stores{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:80px;
}

.store{
background:white;
padding:30px 60px;
border-radius:15px;
font-size:24px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.2);
transition:.3s;
}

.store:hover{
transform:scale(1.05);
}

/* ---------- STICKY SWITCH ---------- */

#topSwitch{
position:fixed;
top:0;
width:100%;
background:white;
display:flex;
justify-content:center;
gap:20px;
padding:10px;
z-index:1000;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.switchBtn{
cursor:pointer;
font-weight:bold;
}

/* ---------- GRID (Pinterest Style) ---------- */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:0;
margin-top:60px;
}

.card{
background:white;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.cardContent{
padding:10px;
}

.buy{
background:#FF6B00;
color:white;
text-align:center;
padding:8px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
}

/* ---------- BACK BUTTON ---------- */

.back{
position:fixed;
left:10px;
top:10px;
background:black;
color:white;
padding:8px 12px;
cursor:pointer;
z-index:1100;
}

</style>
</head>

<body>

<div id="stores">

<div id="categories" class="hidden">

/* ================= FUNCTIONS ================= */

let currentStore="";
let currentCategory="";

function openStore(store){
currentStore=store;

document.getElementById("stores").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");
document.getElementById("topSwitch").classList.remove("hidden");

loadCategories();
}

function goHome(){
location.reload();
}

function loadCategories(){
let grid=document.getElementById("categoryGrid");
grid.innerHTML="";

for(let cat in data[currentStore]){
grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<div class="cardContent">
<h3>${cat}</h3>
<p>${data[currentStore][cat].desc}</p>
</div>
</div>`;
}
}

function openCategory(cat){
currentCategory=cat;

document.getElementById("categories").classList.add("hidden");
document.getElementById("products").classList.remove("hidden");

loadProducts();
}

function backToCategories(){
document.getElementById("products").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");
}

function loadProducts(){
let grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].products.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="cardContent">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<b>${p.price} | ${p.rating}</b>
<div class="buy" onclick="window.open('${p.link}')">Buy Now</div>
</div>
</div>`;
});
}
