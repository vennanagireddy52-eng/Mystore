<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affiliate Store</title>

<style>

/* ---------- GENERAL ---------- */
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6C5CE7,#00B894);
color:#222;
}

.hidden{display:none}

/* ---------- STORE PAGE ---------- */

.store-page{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:60px;
}

.store{
background:white;
padding:30px 60px;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.2);
transition:.3s;
}

.store:hover{
transform:scale(1.05);
}

/* ---------- HEADER ---------- */

.header{
position:sticky;
top:0;
background:white;
padding:12px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.1);
z-index:100;
}

.back{
cursor:pointer;
color:#6C5CE7;
}

/* ---------- GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
}

/* ---------- CARD ---------- */

.card{
background:white;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:10px;
}

.title{font-weight:bold}

.desc{
font-size:13px;
color:#555;
margin:6px 0;
}

.price{color:#00B894;font-weight:bold}
.rating{color:#f39c12}

.buy{
display:block;
text-align:center;
background:#FF6B00;
color:white;
padding:8px;
margin-top:8px;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<!-- ================= STORES ================= -->

<div id="stores" class="store-page">
<div class="store" onclick="openStore('india')">🇮🇳 INDIA STORE</div>
<div class="store" onclick="openStore('us')">🇺🇸 US STORE</div>
</div>

<!-- ================= CATEGORIES ================= -->

<div id="categories" class="hidden">

<div class="header">
<span class="back" onclick="goHome()">⬅ Back</span>
<span id="storeTitle"></span>
</div>

<div id="categoryGrid" class="grid"></div>

</div>

<!-- ================= PRODUCTS ================= -->

<div id="products" class="hidden">

<div class="header">
<span class="back" onclick="backToCategories()">⬅ Back</span>
<span id="categoryTitle"></span>
</div>

<div id="productGrid" class="grid"></div>

</div>

<script>

/* ================= DATA ================= */

const data = {

india:{
Tech:[
{
name:"JBL Bluetooth Speaker",
price:"₹2799",
rating:"4⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
link:"https://amzn.to/40OZeuH",
desc:"Portable Bluetooth speaker delivering deep bass, clear sound, long battery life, durable build quality and reliable wireless connectivity for everyday entertainment."
}
],
Travel:[
{
name:"6 Pack Travel Bags",
price:"₹799",
rating:"4.3⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
link:"https://amzn.to/47iPnky",
desc:"Organize luggage efficiently using lightweight packing cubes designed for travel convenience, space saving storage and easy suitcase organization during trips."
}
]
},

us:{
Tech:[
{
name:"JBL Bluetooth Speaker",
price:"$97",
rating:"4.7⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",
link:"https://amzn.to/3PvtdW7",
desc:"High quality wireless speaker offering immersive sound, powerful bass, durable build and seamless Bluetooth connection suitable for indoor and outdoor listening."
}
],
Travel:[
{
name:"6 Pack Travel Bags",
price:"$27",
rating:"4.8⭐",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/4c468d90-ae53-4139-90f5-507fc3fb2508.jpg",
link:"https://amzn.to/4uRA649",
desc:"Durable travel organizers help separate clothes, maximize luggage space and keep belongings neatly arranged for stress free travel packing."
}
]
}

};

let currentStore="";
let currentCategory="";

/* ================= STORE OPEN ================= */

function openStore(store){

currentStore=store;

document.getElementById("stores").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");

document.getElementById("storeTitle").innerText =
store==="india" ? "🇮🇳 India Store" : "🇺🇸 US Store";

loadCategories();
}

/* ================= LOAD CATEGORIES ================= */

function loadCategories(){

const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${data[currentStore][cat][0].img}">
<div class="info">
<div class="title">${cat}</div>
<div class="desc">Top quality trending products selected carefully for shoppers.</div>
</div>
`;

card.onclick=()=>openCategory(cat);

grid.appendChild(card);

});
}

/* ================= OPEN CATEGORY ================= */

function openCategory(category){

currentCategory=category;

document.getElementById("categories").classList.add("hidden");
document.getElementById("products").classList.remove("hidden");

document.getElementById("categoryTitle").innerText=category;

loadProducts();
}

/* ================= LOAD PRODUCTS ================= */

function loadProducts(){

const grid=document.getElementById("productGrid");
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${p.img}">
<div class="info">
<div class="title">${p.name}</div>
<div class="desc">${p.desc}</div>
<div class="price">${p.price}</div>
<div class="rating">${p.rating}</div>
<a class="buy" href="${p.link}" target="_blank">Buy Now</a>
</div>
`;

grid.appendChild(card);

});
}

/* ================= NAVIGATION ================= */

function goHome(){
document.getElementById("categories").classList.add("hidden");
document.getElementById("stores").classList.remove("hidden");
}

function backToCategories(){
document.getElementById("products").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");
}

</script>

</body>
</html>
