<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Affiliate Store</title>

<style>

/* ---------- GLOBAL ---------- */
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

/* ---------- LAYERS ---------- */
.layer{
display:none;
min-height:100vh;
}

.active{
display:block;
}

/* ---------- STORE PAGE ---------- */
#storeLayer{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#6C5CE7,#00B894);
}

.storeCard{
background:white;
width:80%;
max-width:320px;
padding:30px;
margin:20px;
text-align:center;
border-radius:15px;
font-size:22px;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.2);
cursor:pointer;
}

/* ---------- TOP BAR ---------- */
.topbar{
background:white;
padding:10px;
display:flex;
gap:10px;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.back{
font-size:22px;
cursor:pointer;
}

.search{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* ---------- PINTEREST GRID ---------- */
.grid{
column-count:2;
column-gap:0;
}

.card{
break-inside:avoid;
background:white;
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.info{
padding:10px;
}

.title{
font-weight:bold;
}

.desc{
font-size:13px;
color:#555;
margin:5px 0;
}

.price{
color:#e65100;
font-weight:bold;
}

.buy{
display:block;
background:#ff6b00;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
}

</style>
</head>

<body>

<!-- ================= STORE LAYER ================= -->
<div id="storeLayer" class="active">
<div class="storeCard" onclick="openStore('IND')">🇮🇳 INDIA STORE</div>
<div class="storeCard" onclick="openStore('US')">🇺🇸 US STORE</div>
</div>

<!-- ================= CATEGORY LAYER ================= -->
<div id="categoryLayer" class="layer">

<div class="topbar">
<span class="back" onclick="goHome()">⬅</span>
<input class="search" id="categorySearch" placeholder="Search category..."
oninput="renderCategories()">
</div>

<div id="categoryGrid" class="grid"></div>
</div>

<!-- ================= PRODUCT LAYER ================= -->
<div id="productLayer" class="layer">

<div class="topbar">
<span class="back" onclick="backToCategories()">⬅</span>
<input class="search" id="productSearch" placeholder="Search product..."
oninput="renderProducts()">
</div>

<div id="productGrid" class="grid"></div>
</div>

<script>

/* ---------- DATA ---------- */

const data={

price:"₹2799",

}
],

price:"₹799",
rating:"4.3⭐",
link:"https://amzn.to/47iPnky",
desc:"Lightweight organizer bags designed for efficient packing, separating clothes neatly, saving luggage space, improving travel organization, and making packing and unpacking faster and stress-free."
}
],

Home:[
{

price:"₹999",
rating:"4.6⭐",
link:"https://amzn.to/481afgb",
desc:"Elegant wall frame set perfect for home decoration, gallery walls, memories display, modern interiors, gifting purposes, and enhancing aesthetic appeal with stylish coordinated photo layouts."
}
],

Fashion:[
{

price:"₹899",
rating:"4.1⭐",
link:"https://amzn.to/4swz0ZY",
desc:"Comfortable everyday hoodie made from soft breathable fabric offering warmth, casual style, durability, relaxed fit, and suitable for travel, workouts, winter wear, and daily fashion."
}
]
},

US:{
Tech:[
{
name:"JBL Bluetooth Speaker",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",
price:"$97",

desc:"Premium wireless speaker engineered for immersive sound, extended battery performance, strong connectivity, rugged build quality, and crystal clear audio suitable for indoor and outdoor listening."
}
],

Travel:[
{
name:"6 Pack Travel Bags",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/4c468d90-ae53-4139-90f5-507fc3fb2508.jpg",
price:"$27",

name:"10 Pack Picture Frames",

}
],

{
name:"3 Pack Men's Hoodies",

desc:"Value hoodie pack offering comfort, warmth, casual versatility, durable stitching, modern styling, and suitable for everyday wear, workouts, travel outfits, and relaxed seasonal fashion."
}
]
}
};

/* ---------- VARIABLES ---------- */

let currentStore="";
let currentCategory="";

/* ---------- STORE OPEN ---------- */

function openStore(store){
currentStore=store;

document.getElementById("storeLayer").style.display="none";
document.getElementById("categoryLayer").classList.add("active");

renderCategories();
}

/* ---------- BACK ---------- */

function goHome(){
categoryLayer.classList.remove("active");
productLayer.classList.remove("active");
storeLayer.style.display="flex";
}

function backToCategories(){
productLayer.classList.remove("active");
categoryLayer.classList.add("active");
}

/* ---------- CATEGORIES ---------- */

function renderCategories(){

const grid=document.getElementById("categoryGrid");
const search=document.getElementById("categorySearch").value.toLowerCase();
grid.innerHTML="";

Object.keys(data[currentStore]).forEach(cat=>{

if(!cat.toLowerCase().includes(search)) return;

grid.innerHTML+=`
<div class="card" onclick="openCategory('${cat}')">
<img src="${data[currentStore][cat][0].img}">
<div class="info">
<div class="title">${cat}</div>
<div class="desc">Best curated products for quality, value, lifestyle, and everyday needs.</div>
</div>
</div>`;
});
}

/* ---------- OPEN CATEGORY ---------- */

function openCategory(cat){
currentCategory=cat;
categoryLayer.classList.remove("active");
productLayer.classList.add("active");
renderProducts();
}

/* ---------- PRODUCTS ---------- */

function renderProducts(){

const grid=document.getElementById("productGrid");
const search=document.getElementById("productSearch").value.toLowerCase();
grid.innerHTML="";

data[currentStore][currentCategory].forEach(p=>{

if(!p.name.toLowerCase().includes(search)) return;

grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="window.open('${p.link}','_blank')">
<div class="info">
<div class="title">${p.name}</div>
<div class="desc">${p.desc}</div>
<div class="price">${p.price} | ${p.rating}</div>
</div>
<a class="buy" href="${p.link}" target="_blank">Buy Now</a>
</div>`;
});
}

</script>

</body>
</html>
