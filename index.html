<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>Pro Store Sync</title>

    <link rel="preconnect" href="https://www.amazon.in">
    <link rel="preconnect" href="https://images.weserv.nl">

    <style>
        /* 1. CORE RESET */
        * { touch-action: manipulation; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background:#f0f2f5; color: #1a1a1a; user-select: none; overflow-x: hidden; 
            width: 100vw; height: 100vh;
        }

        /* 2. LAYER SYSTEM */
        .layer { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            overflow-y:auto; padding-bottom: constant(safe-area-inset-bottom); padding-bottom: env(safe-area-inset-bottom); 
            z-index: 10; -webkit-overflow-scrolling: touch;
        }
        .active { display:block !important; }

        /* 3. CENTERED HOME SCREEN (STORES) */
        #storeLayer { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg,#6C5CE7,#00B894); 
            height: 100vh; width: 100vw; padding: 20px; z-index: 20; 
            position: absolute; top: 0; left: 0;
        }
        .storeCard { 
            background: white; width: 90%; max-width: 420px; height: 130px; 
            display: flex; align-items: center; justify-content: center; text-align: center; 
            border-radius: 30px; font-size: 28px; font-weight: 800; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.25); cursor: pointer; margin: 25px 0; 
            border: 4px solid rgba(255,255,255,0.2); transition: transform 0.1s;
        }
        .storeCard:active { transform: scale(0.96); }

        /* 4. GRID & PRODUCT CARDS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { 
            background: white; border-radius: 20px; display: flex; flex-direction: column; 
            min-height: 310px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
            position: relative; border: 1px solid #eee;
        }
        .card img { 
            width: 100%; height: 170px; object-fit: contain; 
            background: #fff; padding: 12px; border-bottom: 1px solid #f9f9f9;
        }

        /* 5. TOPBAR & SEARCH */
        .topbar { 
            padding: 10px 15px; display: flex; align-items: center; position: sticky; 
            top: 0; z-index: 100; background: #6C5CE7; height: 80px; gap: 10px;
            padding-top: constant(safe-area-inset-top); padding-top: env(safe-area-inset-top);
        }
        .back-icon { 
            background: rgba(255,255,255,0.25); border: none; color: white; 
            width: 65px; height: 55px; border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 35px; cursor: pointer; flex-shrink: 0;
        }
        .search-bar { flex-grow: 1; padding: 14px 18px; border-radius: 14px; border: none; font-size: 16px; background: #fff; }
        .info { padding:12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info b { font-size: 13.5px; line-height: 1.3; color: #2d3436; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { font-weight: 800; color: #00b894; font-size: 17px; margin: 5px 0; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:14px; text-decoration:none; font-weight:bold; font-size: 14px; }
        .link-symbol { position:absolute; top:10px; right:10px; background:white; border: 1px solid #6C5CE7; border-radius: 50%; width: 35px; height: 35px; z-index: 10; display: flex; align-items: center; justify-content: center; color: #6C5CE7; }

        /* 6. LOADER & NOTIFICATIONS */
        #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#6C5CE7; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-weight:bold; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #toast { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:14px 28px; border-radius:35px; display:none; z-index:3000; font-size: 14px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>Updating Store...</span></div>
<div id="toast">Copied!</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onpointerdown="hSec('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onpointerdown="hSec('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar">
        <div class="back-icon" onpointerdown="manualBack()">←</div>
        <input type="text" class="search-bar" id="catSearch" placeholder="Search categories..." onkeyup="filterItems('catGrid', this.value)">
    </div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar">
        <div class="back-icon" onpointerdown="manualBack()">←</div>
        <input type="text" class="search-bar" id="pSearch" placeholder="Search products..." onkeyup="filterItems('pGrid', this.value)">
    </div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "";
let navStack = ['storeLayer']; 

async function init() {
    const local = localStorage.getItem('storeData');
    if(local) { data = JSON.parse(local); renderAll(); }
    try {
        const res = await fetch(GITHUB_URL + "?nocache=" + Date.now());
        if(res.ok) {
            data = await res.json();
            localStorage.setItem('storeData', JSON.stringify(data));
            renderAll();
        }
    } catch (e) {}
    window.history.replaceState({layer: 'storeLayer'}, "");
    document.getElementById('loader').style.display = 'none';
}

function renderAll() {
    if(curStore) renC();
    if(curCat) renP();
}

/* --- IMAGE HANDLING --- */
function getImg(u) {
    if(!u) return 'https://via.placeholder.com/400x400?text=No+Image';
    return `https://images.weserv.nl/?url=${encodeURIComponent(u)}&w=400&fit=contain`;
}

function handleImgError(img, originalUrl) {
    if (img.src.includes('weserv.nl')) {
        img.src = originalUrl;
    } else {
        img.src = 'https://via.placeholder.com/400x400?text=Image+Unavailable';
    }
}

/* --- NAVIGATION ENGINE --- */
function showLayer(id, pushHistory = true) {
    document.querySelectorAll('.layer').forEach(l => { l.style.display = 'none'; l.classList.remove('active'); });
    const target = document.getElementById(id);
    target.style.display = 'block';
    target.classList.add('active');
    target.scrollTop = 0;
    if (navStack[navStack.length - 1] !== id) navStack.push(id);
    if (pushHistory) window.history.pushState({layer: id}, "");
}

function manualBack() {
    if (navStack.length > 1) {
        navStack.pop(); 
        showLayer(navStack[navStack.length - 1], false);
    } else {
        showLayer('storeLayer', false);
    }
}

window.onpopstate = function() {
    if (navStack.length > 1) {
        manualBack();
        window.history.pushState({layer: 'stay'}, "");
    }
};

/* --- RENDERERS --- */
function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    if(!data[curStore]) return;
    Object.keys(data[curStore]).forEach(c => {
        const originalImg = (data.META && data.META[curStore] && data.META[curStore][c]?.img) || (data[curStore][c][0]?.img || "");
        g.innerHTML += `
        <div class="card" onpointerdown="openC('${c}')">
            <img src="${getImg(originalImg)}" onerror="handleImgError(this, '${originalImg}')">
            <div class="info"><b>${c}</b></div>
        </div>`;
    });
}

function renP() {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    if(!data[curStore] || !data[curStore][curCat]) return;
    data[curStore][curCat].forEach(p => {
        const shareLink = `${location.origin}${location.pathname}?store=${curStore}&cat=${encodeURIComponent(curCat)}&prod=${p.id}`;
        g.innerHTML += `
        <div class="card" id="${p.id}">
            <button class="link-symbol" onpointerdown="cp('${shareLink}',event)">🔗</button>
            <div onpointerdown="fastRedirect('${p.link}')">
                <img src="${getImg(p.img)}" onerror="handleImgError(this, '${p.img}')">
                <div class="info">
                    <b>${p.name}</b>
                    <span class="price">${p.price}</span>
                </div>
            </div>
            <a class="buy-btn" href="javascript:void(0)" onpointerdown="fastRedirect('${p.link}')">Buy Now</a>
        </div>`;
    });
}

function hSec(s) { curStore = s; renC(); showLayer('catLayer'); }
function openC(c) { curCat = c; renP(); showLayer('pLayer'); }
function fastRedirect(url) { if(url) window.location.assign(url); }
function cp(t, e) { e.stopPropagation(); navigator.clipboard.writeText(t); showToast("Link Copied!"); }
function showToast(m) { 
    const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; 
    setTimeout(()=>t.style.display='none', 2000); 
}
function filterItems(gridId, val) { 
    const q = val.toLowerCase(); 
    document.querySelectorAll(`#${gridId} .card`).forEach(c => {
        c.style.display = c.innerText.toLowerCase().includes(q) ? "flex" : "none";
    }); 
}

window.onload = init;
</script>
</body>
</html>
