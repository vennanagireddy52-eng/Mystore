<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Store</title>

<style>

/* ===== GENERAL ===== */
body{
margin:0;
font-family:Arial;
background:#fafafa;
}

/* ===== LAYER SYSTEM ===== */
.layer{display:none;}
.active{display:block;}

/* ===== STORE PAGE ===== */
.store-page{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:60px;
}

.store-btn{
font-size:28px;
padding:20px 40px;
background:black;
color:white;
border-radius:10px;
cursor:pointer;
}

/* ===== STICKY HEADER ===== */
.header{
position:sticky;
top:0;
background:white;
padding:10px;
z-index:1000;
box-shadow:0 2px 5px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
}

/* ===== SEARCH ===== */
.search{
width:100%;
padding:12px;
border:none;
outline:none;
border-bottom:1px solid #ccc;
}

/* ===== PINTEREST GRID ===== */
.grid{
column-count:2;
column-gap:0;
}

@media(min-width:700px){
.grid{column-count:4;}
}

.card{
break-inside:avoid;
background:white;
margin:0;
padding:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:8px;
}

/* PRODUCT TEXT */
.price{font-weight:bold;}
.rating{color:orange;}

.buy{
display:inline-block;
margin-top:8px;
background:black;
color:white;
padding:8px 12px;
text-decoration:none;
border-radius:5px;
}

</style>
</head>

<body>

<!-- ================= LAYER 1 ================= -->
<div id="storeLayer" class="layer active store-page">

<div class="store-btn" onclick="openStore('IND')">
🇮🇳 India Store
</div>

<div class="store-btn" onclick="openStore('US')">
🇺🇸 US Store
</div>

</div>


<!-- ================= LAYER 2 ================= -->
<div id="categoryLayer" class="layer">

<div class="header">
<button onclick="backToStores()">⬅ Stores</button>
<div>
<button onclick="openStore('IND')">IND</button>
<button onclick="openStore('US')">US</button>
</div>
</div>

<input class="search" placeholder="Search categories..."
oninput="filterCategories(this.value)">

<div id="categoryGrid" class="grid"></div>

</div>


<!-- ================= LAYER 3 ================= -->
<div id="productLayer" class="layer">

<div class="header">
<button onclick="backToCategories()">⬅ Categories</button>
</div>

<input class="search" placeholder="Search products..."
oninput="filterProducts(this.value)">

<div id="productGrid" class="grid"></div>

</div>


<script>

/* ================= PRODUCTS ================= */
/* Yesterday + Today together */

const products = [

/* -------- INDIA -------- */
{
store:"IND",
category:"Tech",
catImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
name:"JBL Bluetooth Speaker",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/7bd6dcb8-d791-44a1-895b-78b5e25157f1.webp",
price:"₹2799",
rating:"4⭐",
link:"https://amzn.to/40OZeuH"
},

{
store:"IND",
category:"Travel",
catImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
name:"6 Pack Travel Bags",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/32db2e5a-2cad-455e-b073-9f9be1bb940d.jpg",
price:"₹799",
rating:"4.3⭐",
link:"https://amzn.to/47iPnky"
},

/* -------- US -------- */
{
store:"US",
category:"Tech",
catImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",
name:"JBL Bluetooth Speaker",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/fbac8cc5-2800-41cf-9458-3f9bcddfead7.webp",
price:"$97",
rating:"4.7⭐",
link:"https://amzn.to/3PvtdW7"
},

{
store:"US",
category:"Home",
catImg:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp",
name:"10 Pack Picture Frames",
img:"https://i.supaimg.com/e6a65bbc-d4e3-4657-8388-0945710f9b08/706d2b1a-7ae1-453c-bb90-c6b77dd7ad75.webp",
price:"$19",
rating:"4.6⭐",
link:"https://amzn.to/3O0WgjM"
}

];

let currentStore="";
let currentCategory="";

/* ===== NAVIGATION ===== */

function openStore(store){
currentStore=store;
showLayer("categoryLayer");
renderCategories();
}

function backToStores(){
showLayer("storeLayer");
}

function backToCategories(){
showLayer("categoryLayer");
}

function showLayer(id){
document.querySelectorAll(".layer")
.forEach(l=>l.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ===== CATEGORIES ===== */

function renderCategories(){

const grid=document.getElementById("categoryGrid");
grid.innerHTML="";

const cats={};

products
.filter(p=>p.store===currentStore)
.forEach(p=>{
if(!cats[p.category]) cats[p.category]=p;
});

Object.values(cats).forEach(cat=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${cat.catImg}">
<h3>${cat.category}</h3>
<p>Best curated products selected for quality, usability, affordability and daily lifestyle improvement recommendations.</p>
`;

div.onclick=()=>{
currentCategory=cat.category;
openProducts();
};

grid.appendChild(div);

});

}

/* ===== PRODUCTS ===== */

function openProducts(){
showLayer("productLayer");

const grid=document.getElementById("productGrid");
grid.innerHTML="";

products
.filter(p=>p.store===currentStore && p.category===currentCategory)
.forEach(p=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">${p.price}</p>
<p class="rating">${p.rating}</p>
<p>
This product is carefully selected based on user reviews, durability,
performance, affordability, and real-world usability to provide
maximum value and long-term satisfaction for everyday users.
</p>
<a class="buy" target="_blank" href="${p.link}">Buy</a>
`;

grid.appendChild(div);

});

}

/* ===== SEARCH ===== */

function filterCategories(q){
document.querySelectorAll("#categoryGrid .card")
.forEach(c=>{
c.style.display=
c.innerText.toLowerCase().includes(q.toLowerCase())
?"block":"none";
});
}

function filterProducts(q){
document.querySelectorAll("#productGrid .card")
.forEach(c=>{
c.style.display=
c.innerText.toLowerCase().includes(q.toLowerCase())
?"block":"none";
});
}

</script>

</body>
</html>
