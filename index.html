<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Store</title>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#f4f7f6; }
        .layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; overflow-y:auto; padding-bottom: 80px; }
        .active { display:block; }
        #storeLayer { display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg,#6C5CE7,#00B894); height: 100vh; padding: 20px; gap: 20px; }
        #catLayer, #pLayer { background: #1bdaff; }
        .storeCard { background: white; width: 100%; max-width: 450px; padding: 35px 20px; text-align: center; border-radius: 20px; font-size: 26px; font-weight: 900; box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; }
        
        #loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#6C5CE7; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-weight:bold; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .search-area { padding: 15px; background: #1bdaff; position: sticky; top: 0; z-index: 100; }
        .search-bar { width: 100%; padding: 12px 15px; border-radius: 12px; border: none; outline: none; font-size: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { column-count:2; column-gap:12px; padding:12px; }
        .card { break-inside: avoid; background:white; margin-bottom:15px; border-radius:18px; overflow:hidden; position:relative; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
        .card img { width:100%; display:block; object-fit: contain; min-height: 150px; max-height: 220px; background: #fff; padding: 10px; }
        .link-symbol { position:absolute; top:10px; right:10px; background:white; border: 1.5px solid #6C5CE7; border-radius: 50%; width: 34px; height: 34px; z-index: 10; display: flex; align-items: center; justify-content: center; color: #6C5CE7; }
        .info { padding:12px; }
        .info b { font-size: 14px; display: block; margin-bottom: 4px; line-height: 1.2; color: #222; overflow: hidden; -webkit-line-clamp: 2; -webkit-box-orient: vertical; display: -webkit-box; }
        .price { font-weight: 800; color: #00b894; font-size: 15px; display: block; }
        .buy-btn { display:block; background:#00b894; color:white; text-align:center; padding:14px; text-decoration:none; font-weight:bold; border-radius: 0 0 18px 18px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span>Opening Store...</span></div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hSec('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hSec('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="search-area"><input type="text" class="search-bar" placeholder="Search Categories..." onkeyup="filterItems('catGrid', this.value)"></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="search-area"><input type="text" class="search-bar" placeholder="Search Products..." onkeyup="filterItems('pGrid', this.value)"></div>
    <div id="pGrid" class="grid"></div>
</div>

<script>
const GITHUB_URL = "https://raw.githubusercontent.com/vennanagireddy52-eng/Mystore/main/store-data.json";
let data = { IND:{}, US:{}, META:{ IND:{}, US:{} } };
let curStore = "", curCat = "";

async function init() {
    // 1. Load Local First
    const local = localStorage.getItem('storeData');
    if(local) data = JSON.parse(local);

    // 2. Try Fetch, but don't let it block
    try {
        const res = await fetch(GITHUB_URL + "?v=" + Date.now());
        if(res.ok) { 
            data = await res.json(); 
            localStorage.setItem('storeData', JSON.stringify(data)); 
        }
    } catch (e) { console.warn("Fetch failed, using cache"); }
    
    // 3. Ensure structure exists
    if(!data.META) data.META = { IND:{}, US:{} };

    // 4. Force Loader Off
    document.getElementById('loader').style.display = 'none';

    // 5. Handle Deep Link
    const urlParams = new URLSearchParams(window.location.search);
    const s = urlParams.get('store'), c = urlParams.get('cat'), pId = urlParams.get('prod');
    if (s && data[s]) {
        curStore = s; renC();
        showLayer('catLayer', true);
        if (c && data[s][c]) {
            curCat = c; renP();
            showLayer('pLayer', true);
            setTimeout(() => { document.getElementById(pId)?.scrollIntoView({behavior:'smooth', block:'center'}); }, 800);
        }
    }
}

function showLayer(id, push = false) {
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (push) history.pushState({layer: id}, "");
}

window.onpopstate = (e) => {
    if (e.state && e.state.layer) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById(e.state.layer).classList.add('active');
    } else {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('storeLayer').classList.add('active');
    }
};

function renC() {
    const g = document.getElementById('catGrid'); g.innerHTML = "";
    if(!data[curStore]) return;
    Object.keys(data[curStore]).forEach(c => {
        const img = (data.META && data.META[curStore] && data.META[curStore][c]?.img) || data[curStore][c][0]?.img;
        g.innerHTML += `<div class="card" onclick="openC('${c}')"><img src="${img || 'https://via.placeholder.com/150'}"><div class="info"><b>${c}</b></div></div>`;
    });
}
function renP() {
    const g = document.getElementById('pGrid'); g.innerHTML = "";
    if(!data[curStore] || !data[curStore][curCat]) return;
    data[curStore][curCat].forEach(p => {
        g.innerHTML += `
        <div class="card" id="${p.id}">
            <div onclick="window.location.replace('${p.link}')">
                <img src="${p.img}">
                <div class="info"><b>${p.name}</b><span class="price">${p.price}</span></div>
            </div>
            <div class="buy-btn" onclick="window.location.replace('${p.link}')">Buy Now</div>
        </div>`;
    });
}
function hSec(s) { curStore = s; renC(); showLayer('catLayer', true); }
function openC(c) { curCat = c; renP(); showLayer('pLayer', true); }
function filterItems(gridId, val) { const q = val.toLowerCase(); document.querySelectorAll(`#${gridId} .card`).forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none"); }

window.onload = init;
</script>
</body>
</html>
