<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Store App</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* ---------- STORE BAR (LAYER 1) ---------- */

.store-bar{
position:sticky;
top:0;
display:flex;
background:#111;
color:white;
z-index:1000;
}

.store{
flex:1;
text-align:center;
padding:15px;
cursor:pointer;
}

.store.active{
background:#ff5722;
}

/* ---------- SEARCH ---------- */

.search{
width:100%;
padding:12px;
border:none;
outline:none;
font-size:16px;
position:sticky;
top:50px;
z-index:900;
}

/* ---------- PINTEREST GRID ---------- */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:0; /* NO margins */
}

.card{
background:white;
padding:10px;
border:1px solid #eee;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.title{
font-weight:bold;
margin-top:5px;
}

.desc{
font-size:13px;
color:#555;
}

.price{
color:#ff5722;
font-weight:bold;
}

.rating{
color:gold;
}

/* highlight when opened via link */
.highlight{
outline:4px solid #ff5722;
}

/* back button */

.back{
padding:10px;
background:#222;
color:white;
cursor:pointer;
text-align:center;
}

</style>
</head>

<body>

<!-- ================= LAYER 1 ================= -->
<div class="store-bar">
<div class="store active" onclick="openStore('store1')">Store A</div>
<div class="store" onclick="openStore('store2')">Store B</div>
</div>

<!-- ================= LAYER 2 ================= -->
<input class="search" id="categorySearch"
placeholder="Search Categories..."
oninput="filterCategories()">

<div id="categories" class="grid"></div>

<!-- ================= LAYER 3 ================= -->
<div id="productsLayer" style="display:none">

<div class="back" onclick="backToCategories()">⬅ Back</div>

<input class="search" id="productSearch"
placeholder="Search Products..."
oninput="filterProducts()">

<div id="products" class="grid"></div>

</div>

<script>

/* ---------- DATA ---------- */

const data={
store1:{
categories:[
{
id:"electronics",
name:"Electronics",
desc:"Smart gadgets, accessories, devices, chargers, headphones, power banks, speakers, cameras, and daily technology essentials for modern digital lifestyle needs.",
products:[
{
id:"phone",
name:"Smart Phone",
price:"₹12,999",
rating:"★★★★☆",
desc:"This smartphone delivers smooth performance, reliable battery life, vibrant display clarity, fast processing speed, and excellent camera quality suitable for everyday communication, entertainment, productivity, gaming, browsing, and multimedia consumption experiences.",
img:"https://picsum.photos/300?1",
yesterday:true
},
{
id:"headphones",
name:"Headphones",
price:"₹1,499",
rating:"★★★★★",
desc:"Comfortable wireless headphones featuring immersive sound quality, noise isolation, extended battery backup, lightweight design, strong connectivity stability, ergonomic ear cushioning, and crystal clear audio performance ideal for music lovers and daily usage.",
img:"https://picsum.photos/300?2"
}
]
},
{
id:"fashion",
name:"Fashion",
desc:"Trending clothing styles including shirts, jeans, footwear, casual wear, accessories, seasonal outfits, and comfortable designs for everyday fashion lovers.",
products:[
{
id:"shirt",
name:"Casual Shirt",
price:"₹799",
rating:"★★★★☆",
desc:"Premium cotton casual shirt designed with breathable fabric, modern fitting style, durable stitching, comfortable wear experience, lightweight material, vibrant color retention, and versatile appearance suitable for office, outings, or daily wear.",
img:"https://picsum.photos/300?3"
}
]
}
]
},

store2:{
categories:[
{
id:"groceries",
name:"Groceries",
desc:"Fresh vegetables, fruits, dairy products, snacks, beverages, kitchen essentials, and everyday household food supplies delivered conveniently and quickly.",
products:[
{
id:"apple",
name:"Fresh Apples",
price:"₹120/kg",
rating:"★★★★★",
desc:"Fresh farm sourced apples carefully selected for sweetness, crisp texture, natural freshness, and nutritional richness providing vitamins, fiber, antioxidants, and healthy daily consumption benefits for families and individuals.",
img:"https://picsum.photos/300?4",
yesterday:true
}
]
}
]
}
};

let currentStore="store1";
let currentProducts=[];

/* ---------- STORE SWITCH ---------- */

function openStore(store){
currentStore=store;

document.querySelectorAll(".store")
.forEach(s=>s.classList.remove("active"));

event.target.classList.add("active");

renderCategories();
}

/* ---------- RENDER CATEGORIES ---------- */

function renderCategories(){

document.getElementById("productsLayer").style.display="none";
document.getElementById("categories").style.display="grid";

let html="";

data[currentStore].categories.forEach(cat=>{

let link=location.origin+location.pathname+
`?store=${currentStore}&category=${cat.id}`;

html+=`
<div class="card" id="${cat.id}">
<img src="https://picsum.photos/300?random=${cat.id}">
<div class="title">${cat.name}</div>
<div class="desc">${cat.desc}</div>
<button onclick="navigator.share?navigator.share({url:'${link}'}):copy('${link}')">
Share
</button>
</div>
`;
});

document.getElementById("categories").innerHTML=html;

checkDeepLink();
}

/* ---------- PRODUCTS ---------- */

function openCategory(id){

const cat=data[currentStore].categories.find(c=>c.id===id);

currentProducts=cat.products;

document.getElementById("categories").style.display="none";
document.getElementById("productsLayer").style.display="block";

renderProducts();
}

function renderProducts(){

let html="";

currentProducts.forEach(p=>{

let link=location.origin+location.pathname+
`?store=${currentStore}&product=${p.id}`;

html+=`
<div class="card">
<img src="${p.img}">
<div class="title">${p.name}</div>
<div class="desc">${p.desc}</div>
<div class="price">${p.price}</div>
<div class="rating">${p.rating}</div>
<button onclick="navigator.share?navigator.share({url:'${link}'}):copy('${link}')">
Share
</button>
</div>
`;
});

document.getElementById("products").innerHTML=html;
}

/* ---------- SEARCH ---------- */

function filterCategories(){
let v=categorySearch.value.toLowerCase();
document.querySelectorAll("#categories .card")
.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

function filterProducts(){
let v=productSearch.value.toLowerCase();
document.querySelectorAll("#products .card")
.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}

/* ---------- BACK ---------- */

function backToCategories(){
renderCategories();
}

/* ---------- SHARE COPY ---------- */

function copy(text){
navigator.clipboard.writeText(text);
alert("Link copied!");
}

/* ---------- DEEP LINK ---------- */

function checkDeepLink(){

const params=new URLSearchParams(location.search);

let cat=params.get("category");

if(cat){
setTimeout(()=>{
let el=document.getElementById(cat);
if(el){
el.classList.add("highlight");
el.scrollIntoView({behavior:"smooth"});
}
},300);
}
}

/* ---------- START ---------- */

renderCategories();

</script>

</body>
</html>
