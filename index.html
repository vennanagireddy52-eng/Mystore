<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-15GKXJTXQF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-15GKXJTXQF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Pro Store Sync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast">Link Copied!</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#6C5CE7;">Cloud Admin</h2>
        <button onclick="closeAdmin()" style="border:none; background:#eee; width:45px; height:45px; border-radius:50%;">✕</button>
    </div>
    <div class="admin-section"><button class="btn-main" onclick="copyForGithub()" style="background:orange;">📋 COPY FOR GITHUB</button></div>
    <div class="admin-section">
        <h3>Categories</h3>
        <select id="manageStore" onchange="syncUI()"><option value="IND">🇮🇳 India</option><option value="US">🇺🇸 US</option></select>
        <select id="editCatSelect" onchange="loadCat()"><option value="">-- Edit Category --</option></select>
        <input type="text" id="catInp" placeholder="Category Name"><input type="text" id="catImgInp" placeholder="Image URL">
        <div style="display:flex; gap:10px;">
            <button class="btn-main" onclick="saveCat()">Save</button>
            <button class="btn-main" onclick="deleteCat()" style="background:#ff4757;">Delete</button>
        </div>
    </div>
    <div class="admin-section">
        <h3>Products</h3>
        <select id="pCatSel" onchange="syncPList()"><option value="">Select Category</option></select>
        <select id="editPSel" onchange="loadP()"><option value="">-- New Product --</option></select>
        <input type="text" id="pName" placeholder="Product Name"><textarea id="pDesc" placeholder="Description"></textarea>
        <input type="text" id="pPrice" placeholder="Price"><input type="text" id="pImg" placeholder="Image URL"><input type="text" id="pLink" placeholder="Affiliate Link">
        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="background:#00B894;" onclick="saveP()">Save</button>
            <button class="btn-main" onclick="deleteP()" style="background:#ff4757;">Delete</button>
        </div>
    </div>
</div>

<div id="storeLayer" class="layer active">
    <div class="storeCard" onclick="hStore('IND')">🇮🇳 INDIA STORE</div>
    <div class="storeCard" onclick="hStore('US')">🇺🇸 US STORE</div>
</div>

<div id="catLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="history.back()">←</button><span class="top-title" id="stTitle">Categories</span></div>
    <div id="catGrid" class="grid"></div>
</div>

<div id="pLayer" class="layer">
    <div class="topbar"><button class="back-icon" onclick="history.back()">←</button><span class="top-title" id="ctTitle">Products</span></div>
    <div id="pGrid" class="grid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
